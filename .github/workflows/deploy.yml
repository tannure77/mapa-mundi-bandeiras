name: Deploy para Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Upload via FTPS
        timeout-minutes: 10
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USER:     ${{ secrets.FTP_USERNAME }}
          FTP_PASS:     ${{ secrets.FTP_PASSWORD }}
        run: |
          for tentativa in 1 2 3; do
            echo "Tentativa $tentativa de 3..."
            lftp -c "
              set ftp:ssl-force true;
              set ssl:verify-certificate false;
              set cmd:fail-exit true;
              set net:timeout 30;
              set net:max-retries 2;
              set net:reconnect-interval-base 5;
              open -u $FTP_USER,$FTP_PASS $FTP_SERVER;
              put -O /public_html/ft/bandeiras index.html;
              bye
            " && echo "Deploy concluído na tentativa $tentativa!" && exit 0
            echo "Tentativa $tentativa falhou. Aguardando 15s..."
            sleep 15
          done
          echo "Todas as tentativas falharam."
          exit 1
