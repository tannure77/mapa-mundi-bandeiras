<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bandeiras do Mundo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏳️</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #181818;
  --bg2:     #222222;
  --card:    #ffffff;
  --border:  #333333;
  --text:    #f5f5f5;
  --text2:   #888888;
  --accent:  #6366f1;
  --radius:  14px;

  --c-africa:        #e8895a;
  --c-asia:          #e05c5c;
  --c-europe:        #2fbfad;
  --c-north-america: #d4a94e;
  --c-south-america: #4daf7c;
  --c-oceania:       #4da6d4;
  --c-all:           #6366f1;
}

html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 20;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 12px;
}

.header-top {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 14px;
}

header h1 { font-size: 18px; font-weight: 700; flex: 1; }

.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 14px; pointer-events: none; opacity: 0.45;
}
#search {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 7px 12px 7px 30px;
  font-size: 14px; color: var(--text);
  width: 220px; outline: none;
  transition: border-color 0.2s;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--text2); }

/* ── CONTINENT FILTERS ── */
.filters {
  display: flex; gap: 8px; flex-wrap: wrap;
}

.filter-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 14px;
  border-radius: 100px;
  border: 1.5px solid transparent;
  background: var(--bg);
  color: var(--text2);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: color 0.18s, background 0.18s, border-color 0.18s;
  white-space: nowrap;
}

.filter-btn .dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
}

.filter-btn:hover {
  color: var(--text);
  border-color: currentColor;
}

.filter-btn.active {
  color: #fff;
  border-color: transparent;
}

.filter-btn[data-cont="all"].active      { background: var(--c-all); }
.filter-btn[data-cont="africa"].active   { background: var(--c-africa); }
.filter-btn[data-cont="asia"].active     { background: var(--c-asia); }
.filter-btn[data-cont="europe"].active   { background: var(--c-europe); }
.filter-btn[data-cont="north-america"].active { background: var(--c-north-america); }
.filter-btn[data-cont="south-america"].active { background: var(--c-south-america); }
.filter-btn[data-cont="oceania"].active  { background: var(--c-oceania); }

/* ── STATS BAR ── */
#stats {
  padding: 10px 20px 0;
  font-size: 13px; color: var(--text2);
}

/* ── GRID ── */
#grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 20px;
  padding: 18px 24px 48px;
}

.flag-card {
  position: relative;
  background: var(--card);
  border: 1.5px solid #e5e7eb;
  border-radius: var(--radius);
  padding: 35px 18px 25px;
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
  cursor: default;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  animation: fadeIn 0.2s ease both;
  user-select: none;
}

.flag-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  border-color: var(--accent);
}

.flag-emoji {
  font-size: 90px;
  line-height: 1;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2));
}

.flag-name {
  font-size: 15px; font-weight: 700;
  text-align: center; line-height: 1.35;
  color: #111827;
}

.flag-iso {
  font-size: 12px; font-weight: 700;
  font-family: 'SF Mono', Menlo, monospace;
  padding: 3px 9px;
  border-radius: 5px;
  background: #f3f4f6;
  border: 1px solid #e5e7eb;
  color: #6b7280;
  letter-spacing: 0.05em;
}

.flag-cont-dot {
  width: 7px; height: 7px; border-radius: 50%;
  position: absolute; top: 10px; right: 10px;
}

/* ── EMPTY ── */
#empty {
  display: none;
  grid-column: 1/-1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
  font-size: 17px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── MOBILE ── */
@media (max-width: 900px) {
  #grid { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 600px) {
  header { padding: 12px 14px 10px; }
  .header-top { margin-bottom: 10px; }
  header h1 { font-size: 15px; }
  #search { width: 150px; }
  #grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px 14px 32px; }
  .flag-emoji { font-size: 65px; }
  .flag-card { padding: 25px 12px 18px; }
}
</style>
</head>

<div id="grid">

// ================================================================
//  CONTINENTES
// ================================================================
const CONTINENTS = [
  { key:"all",           label:"Todos",         emoji:"🌐", color:"var(--c-all)"           },
  { key:"africa",        label:"África",         emoji:"🌍", color:"var(--c-africa)"        },
  { key:"asia",          label:"Ásia",           emoji:"🌏", color:"var(--c-asia)"          },
  { key:"europe",        label:"Europa",         emoji:"🌍", color:"var(--c-europe)"        },
  { key:"north-america", label:"Am. do Norte",   emoji:"🌎", color:"var(--c-north-america)" },
  { key:"south-america", label:"Am. do Sul",     emoji:"🌎", color:"var(--c-south-america)" },
  { key:"oceania",       label:"Oceania",        emoji:"🌏", color:"var(--c-oceania)"       },
];

// Lookup de cor por continente (derivado de CONTINENTS — sem duplicação)
const CONT_COLOR = Object.fromEntries(CONTINENTS.slice(1).map(c => [c.key, c.color]));

// ================================================================
//  PRÉ-PROCESSAMENTO — listas ordenadas por continente (executa 1x)
// ================================================================
const collator = new Intl.Collator('pt-BR');
const SORTED = {
  all: [...COUNTRIES].sort((a, b) => collator.compare(a.name, b.name)),
};
CONTINENTS.slice(1).forEach(({ key }) => {
  SORTED[key] = SORTED.all.filter(c => c.continent === key);
});

// ================================================================
//  ESTADO E REFS DOM
// ================================================================
let activeContinent = 'all';
let activeBtn       = null;

const $grid   = document.getElementById('grid');
const $empty  = document.getElementById('empty');
const $stats  = document.getElementById('stats');
const $search = document.getElementById('search');

// ================================================================
//  BUILD FILTERS
// ================================================================
function buildFilters() {
  const wrap = document.getElementById('filters');
  CONTINENTS.forEach(c => {
    const count = SORTED[c.key]?.length ?? COUNTRIES.length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (c.key === 'all' ? ' active' : '');
    btn.dataset.cont = c.key;

    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = c.color;
    btn.appendChild(dot);
    btn.append(`${c.emoji} ${c.label} (${count})`);

    btn.addEventListener('click', () => {
      if (activeBtn) activeBtn.classList.remove('active');
      btn.classList.add('active');
      activeBtn = btn;
      activeContinent = c.key;
      applyFilters();
    });

    if (c.key === 'all') activeBtn = btn;
    wrap.appendChild(btn);
  });
}

// ================================================================
//  RENDER GRID
// ================================================================
function applyFilters() {
  const q = $search.value.toLowerCase().trim();
  let list = SORTED[activeContinent];

  if (q) {
    list = list.filter(c =>
      c.name.toLowerCase().includes(q) || c.iso.toLowerCase().includes(q)
    );
  }

  // Limpa cards anteriores mantendo o #empty no grid
  $grid.replaceChildren($empty);

  if (list.length === 0) {
    $empty.style.display = 'block';
    $stats.textContent = '';
    return;
  }

  $empty.style.display = 'none';
  $stats.textContent = `${list.length} ${activeContinent === 'all' ? 'países e territórios' : 'países'}${q ? ` com "${q}"` : ''}`;

  const frag = document.createDocumentFragment();
  list.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'flag-card';
    card.style.animationDelay = `${Math.min(i * 18, 300)}ms`;
    card.innerHTML =
      `<div class="flag-cont-dot" style="background:${CONT_COLOR[c.continent]}"></div>` +
      `<div class="flag-emoji">${c.flag}</div>` +
      `<div class="flag-name">${c.name}</div>` +
      `<div class="flag-iso">${c.iso}</div>`;
    frag.appendChild(card);
  });
  $grid.appendChild(frag);
}

// ================================================================
//  INIT
// ================================================================
buildFilters();
applyFilters();
</script>
