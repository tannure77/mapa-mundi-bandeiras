  { iso:"RS", name:"Sérvia",              continent:"europe", flag:"🇷🇸", type:"país",       desc:"A bandeira da Sérvia é um tricolor horizontal vermelho, azul e branco com o brasão nacional à esquerda. O brasão tem a águia bicéfala e o escudo em forma de cruz com quatro letras S cirílicas — símbolo das 'quatro cabeças da cruz sérvia'. O vermelho, azul e branco são as cores eslavas tradicionais. Adotada com a independência da União Estatal Sérvia e Montenegro em 2006." },
  { iso:"SK", name:"Eslováquia",          continent:"europe", flag:"🇸🇰", type:"país",       desc:"A bandeira da Eslováquia é um tricolor horizontal branco, azul e vermelho com o brasão nacional (cruz dupla sobre montanhas azuis) no lado esquerdo. As cores eslavas refletem a identidade eslava do povo. A cruz dupla (patriarcal) em campo dourado sobre montanhas azuis é símbolo da Eslováquia medieval e de sua herança cristã. Adotada em 1992, com a dissolução pacífica da Checoslováquia." },
  { iso:"SI", name:"Eslovênia",           continent:"europe", flag:"🇸🇮", type:"país",       desc:"A bandeira da Eslovênia é um tricolor horizontal branco, azul e vermelho com o brasão nacional (Monte Triglav, ondas azuis e três estrelas) no canto superior esquerdo. O Triglav é o pico mais alto da Eslovênia e símbolo nacional. As ondas representam o rio Sava e o acesso ao mar Adriático; as três estrelas, a herança histórica dos condes de Celje. Adotada com a independência da Iugoslávia em 1991." },
  { iso:"ES", name:"Espanha",             continent:"europe", flag:"🇪🇸", type:"país",       desc:"A bandeira da Espanha tem faixas vermelhas (superior e inferior) com faixa amarela mais larga no centro e o brasão nacional à esquerda. O amarelo e vermelho são as cores heráldicas de Castela e Aragão, os reinos que uniram a Espanha no século XV. O brasão inclui os escudos dos reinos históricos, as Colunas de Hércules e a coroa real. Adotada na forma atual pela constituição democrática de 1978." },
  { iso:"SE", name:"Suécia",              continent:"europe", flag:"🇸🇪", type:"país",       desc:"A bandeira da Suécia tem fundo azul com uma cruz dourada nórdica. O azul representa o céu e os lagos; o amarelo, o sol e a riqueza mineral. A cruz nórdica simboliza o Cristianismo. As cores foram usadas desde o século XVI, com o reinado de Gustavo Vasa, e consolidadas como símbolo sueco ao longo dos séculos. É uma das mais clássicas e reconhecíveis bandeiras da Europa." },
  { iso:"CH", name:"Suíça",              continent:"europe", flag:"🇨🇭", type:"país",       desc:"A bandeira da Suíça tem fundo vermelho com uma cruz branca quadrada no centro. É uma das duas únicas bandeiras nacionais de formato quadrado (junto com o Vaticano). A cruz branca foi usada em batalha pela primeira vez em 1339, na Batalha de Laupen. O símbolo é tão identificado com a Suíça que inspirou o da Cruz Vermelha Internacional (com as cores invertidas). Adotada oficialmente em 1889." },
  { iso:"UA", name:"Ucrânia",             continent:"europe", flag:"🇺🇦", type:"país",       desc:"A bandeira da Ucrânia tem duas faixas horizontais iguais — azul (superior) e amarela (inferior). O azul representa o céu vasto; o amarelo, os campos de trigo dourados que caracterizam a paisagem ucraniana. Juntas, as cores evocam 'céu azul sobre campos dourados'. Foram usadas pelos cossacos historicamente. Adotada em 1918 na primeira república independente e restaurada em 1991 com a dissolução da URSS." },
  { iso:"GB", name:"Reino Unido",         continent:"europe", flag:"🇬🇧", type:"país",       desc:"A bandeira do Reino Unido, chamada Union Jack, combina as cruzes de São Jorge (Inglaterra, vermelha sobre branco), Santo André (Escócia, branco sobre azul) e São Patrício (Irlanda, vermelho sobre branco). O azul representa a Escócia; o vermelho e branco, a Inglaterra e a Irlanda. Adotada em 1801 com a criação do Reino Unido da Grã-Bretanha e Irlanda. É uma das mais reconhecíveis bandeiras do mundo." },
  { iso:"VA", name:"Vaticano",            continent:"europe", flag:"🇻🇦", type:"país",       desc:"A bandeira do Vaticano é dividida verticalmente em amarelo à esquerda e branco à direita, com as chaves cruzadas de São Pedro e a tiara papal no campo branco. O amarelo representa o ouro (poder temporal) e o branco, a prata (poder espiritual). As chaves de São Pedro simbolizam o poder espiritual da Igreja Católica. É uma das duas bandeiras quadradas e adotada com os Acordos de Latrão em 1929." },
  { iso:"GI", name:"Gibraltar",           continent:"europe", flag:"🇬🇮", type:"território", desc:"A bandeira de Gibraltar tem fundo branco com uma faixa vermelha na base e um castelo vermelho de três torres com uma chave dourada. O castelo e a chave são símbolos heráldicos de Gibraltar desde o século XIV, representando sua importância estratégica. A chave simboliza o controle do estreito que separa o Mediterrâneo do Atlântico. Gibraltar é território britânico ultramarino na ponta sul da Península Ibérica. Adotada em 1982." },

  // ── AMÉRICA DO NORTE ──
  { iso:"AG", name:"Antígua e Barbuda",    continent:"north-america", flag:"🇦🇬", type:"país",       desc:"A bandeira de Antígua e Barbuda tem fundo preto com triângulo invertido de três faixas — branca, azul e branca — e a metade superior de um sol dourado. O preto representa o povo africano e seus ancestrais; o azul, o mar do Caribe; o branco, as praias de areia branca; e o amarelo, o sol tropical. O sol nascente simboliza a aurora de uma nova era de independência. Adotada em 1967." },
  { iso:"BS", name:"Bahamas",              continent:"north-america", flag:"🇧🇸", type:"país",       desc:"A bandeira das Bahamas tem triângulo preto à esquerda e três faixas horizontais — aqua (superior), amarela e aqua — à direita. O azul-aqua representa o oceano Atlântico que envolve as mais de 700 ilhas; o amarelo, as praias de areia dourada e os recursos minerais; e o preto, a unidade e a força do povo. Adotada na independência do Reino Unido em 1973." },
  { iso:"BB", name:"Barbados",             continent:"north-america", flag:"🇧🇧", type:"país",       desc:"A bandeira de Barbados tem três faixas verticais — azul, amarela e azul — com um tridente preto (sem a haste superior) no centro. O azul representa o oceano e o céu; o amarelo, as praias e o sol. O tridente partido simboliza o rompimento com o passado colonial britânico. Adotada na independência em 1966 e inspirada no Neptuno, deus do mar, refletindo a ligação dos barbadenses com o oceano." },
  { iso:"BZ", name:"Belize",              continent:"north-america", flag:"🇧🇿", type:"país",       desc:"A bandeira de Belize tem fundo azul com faixas vermelhas finas no topo e na base, e o brasão nacional no centro. O azul representa o Partido Unido do Povo (PUP) e o vermelho, o Partido Democrático Unido (UDP) — reflexo do consenso político nacional. O brasão inclui barco, escudo de mogno, ferramentas e dois trabalhadores, sob a divisa 'Sub Umbra Floreo' (Floresço à Sombra). Adotada em 1981." },
  { iso:"CA", name:"Canadá",              continent:"north-america", flag:"🇨🇦", type:"país",       desc:"A bandeira do Canadá tem campos vermelhos nas bordas, campo branco no centro e uma folha de bordo vermelha de 11 pontas. A folha de bordo é símbolo nacional desde o século XIX. O vermelho e branco são as cores nacionais desde 1921. Adotada em 1965, substituindo a Red Ensign britânica — a mudança foi controversa, mas a folha de bordo tornou-se um dos símbolos mais reconhecíveis do mundo." },
  { iso:"CR", name:"Costa Rica",          continent:"north-america", flag:"🇨🇷", type:"país",       desc:"A bandeira da Costa Rica tem cinco faixas horizontais — azul, branco, vermelho (mais larga), branco e azul — com brasão nacional no lado esquerdo da faixa vermelha. O azul representa o céu, as oportunidades e a perseverança; o branco, a paz; e o vermelho, o sangue dos defensores. Inspirada pela tricolor francesa durante a independência, foi adotada em 1906 e é baseada nos ideais de liberdade e democracia." },
  { iso:"CU", name:"Cuba",               continent:"north-america", flag:"🇨🇺", type:"país",       desc:"A bandeira de Cuba tem cinco faixas horizontais alternadas azuis e brancas com triângulo vermelho à esquerda e estrela branca de cinco pontas. O triângulo vermelho representa o sangue derramado pela independência e os ideais maçônicos dos fundadores. A estrela branca ('Estrela Solitária') simboliza a liberdade e a independência. O azul representa os três departamentos coloniais. Adotada em 1902." },
  { iso:"DM", name:"Dominica",            continent:"north-america", flag:"🇩🇲", type:"país",       desc:"A bandeira de Dominica tem fundo verde com uma cruz amarela, preta e branca e o papagaio imperial Sisserou (Amazona imperialis) no centro. O verde representa as florestas tropicais densas; o amarelo, o povo caribenho; o preto, o solo rico; e o branco, a água pura. O papagaio Sisserou é endêmico de Dominica e símbolo nacional. Adotada na independência em 1978." },
  { iso:"DO", name:"Rep. Dominicana",     continent:"north-america", flag:"🇩🇴", type:"país",       desc:"A bandeira da República Dominicana tem quadrantes azuis e vermelhos alternados, separados por uma cruz branca, com brasão nacional no centro. O azul representa a liberdade; o vermelho, o sangue dos heróis; e a cruz branca, a fé cristã. É a única bandeira nacional com uma Bíblia no brasão. Adotada em 1844, quando o país proclamou independência tanto da Espanha quanto do Haiti." },
  { iso:"SV", name:"El Salvador",         continent:"north-america", flag:"🇸🇻", type:"país",       desc:"A bandeira de El Salvador tem três faixas horizontais — azul (superior), branca e azul — com brasão nacional no centro da faixa branca. O azul representa o oceano Pacífico e o Caribe que cercam a América Central; o branco, a paz. O brasão inclui um triângulo representando os três poderes, cinco vulcões simbolizando os países centro-americanos e o gorro da liberdade. Adotada em 1912." },
  { iso:"GD", name:"Granada",             continent:"north-america", flag:"🇬🇩", type:"país",       desc:"A bandeira de Granada tem borda vermelha com triângulos amarelos internos nos quatro lados, estrelas vermelhas de cinco pontas, fundo amarelo e verde dividido horizontalmente, e uma noz-moscada amarela no lado esquerdo. O verde representa a vegetação; o vermelho, a coragem; o amarelo, a sabedoria e o calor. A noz-moscada é o símbolo mais importante — Granada é um dos maiores produtores do mundo. Adotada em 1974." },
  { iso:"GT", name:"Guatemala",           continent:"north-america", flag:"🇬🇹", type:"país",       desc:"A bandeira da Guatemala tem três faixas verticais — azul, branco e azul — com o brasão nacional no centro. O azul representa o oceano Pacífico e o mar do Caribe que banham o país, e o branco, a pureza e a paz. O brasão inclui o quetzal (ave nacional sagrada dos maias), um pergaminho com a data da independência e fuzis cruzados com espadas. Adotada em 1871." },
  { iso:"HT", name:"Haiti",              continent:"north-america", flag:"🇭🇹", type:"país",       desc:"A bandeira do Haiti tem duas faixas horizontais — azul (superior) e vermelha — com brasão nacional no centro (campo branco). Inspirada na tricolor francesa, o branco central foi removido como símbolo da expulsão dos colonizadores brancos durante a Revolução Haitiana de 1804 — a única revolta de escravos bem-sucedida da história. O brasão exibe canhões, palmeiras e a divisa 'L'Union Fait La Force'. Adotada em 1820." },
  { iso:"HN", name:"Honduras",            continent:"north-america", flag:"🇭🇳", type:"país",       desc:"A bandeira de Honduras tem três faixas horizontais — azul, branca e azul — com cinco estrelas azuis de cinco pontas na faixa central. O azul representa o mar do Caribe e o oceano Pacífico; o branco, a paz e a prosperidade. As cinco estrelas azuis representam os cinco estados fundadores da República Federal da América Central (Guatemala, El Salvador, Honduras, Nicarágua e Costa Rica). Adotada em 1866." },
  { iso:"JM", name:"Jamaica",             continent:"north-america", flag:"🇯🇲", type:"país",       desc:"A bandeira da Jamaica tem uma diagonal dourada em X dividindo o campo em quatro triângulos: pretos (esquerda e direita) e verdes (topo e base). O preto representa as adversidades superadas; o verde, a esperança e a riqueza agrícola; e o ouro, o brilho do sol e a riqueza natural. Adotada na independência do Reino Unido em 1962. É a única bandeira nacional do mundo que não contém as cores vermelha, branca ou azul." },
  { iso:"MX", name:"México",             continent:"north-america", flag:"🇲🇽", type:"país",       desc:"A bandeira do México tem três faixas verticais — verde, branca e vermelha — com o brasão nacional no centro. O verde representa a esperança e os valores da independência; o branco, a pureza da fé; e o vermelho, a união e o sangue dos heróis nacionais. O brasão mostra a lenda asteca fundacional: uma águia sobre uma serpente num cacto. Adotada na forma atual em 1968." },
  { iso:"NI", name:"Nicarágua",           continent:"north-america", flag:"🇳🇮", type:"país",       desc:"A bandeira da Nicarágua tem três faixas horizontais — azul, branca e azul — com brasão nacional no centro. O azul representa os oceanos Pacífico e Atlântico; o branco, a paz. O brasão inclui um triângulo com o gorro frígio da liberdade, cinco vulcões simbolizando os países centro-americanos e um arco-íris. A bandeira é muito similar à da Argentina e à de El Salvador. Adotada em 1908." },
  { iso:"PA", name:"Panamá",             continent:"north-america", flag:"🇵🇦", type:"país",       desc:"A bandeira do Panamá tem quatro quadrantes: branco com estrela azul (superior esquerdo), vermelho (superior direito), azul (inferior esquerdo) e branco com estrela vermelha (inferior direito). O vermelho representa o Partido Conservador histórico; o azul, o Partido Liberal; e o branco, a paz entre os dois. As estrelas representam a pureza e a lei. Adotada na independência da Colômbia em 1903." },
  { iso:"KN", name:"S. Cristóvão e Névis", continent:"north-america", flag:"🇰🇳", type:"país",      desc:"A bandeira de São Cristóvão e Névis tem faixas diagonais verde (superior esquerdo) e vermelho (inferior direito), com uma diagonal preta mais larga bordeada de amarelo no centro, contendo duas estrelas brancas de cinco pontas. O verde representa a terra fértil; o amarelo, o sol; o preto, a herança africana; o vermelho, a luta; e as duas estrelas, as duas ilhas — São Cristóvão e Névis. Adotada em 1983." },
  { iso:"LC", name:"Santa Lúcia",         continent:"north-america", flag:"🇱🇨", type:"país",       desc:"A bandeira de Santa Lúcia tem fundo azul com um triângulo preto (bordeado de branco) e um triângulo menor amarelo sobre ele no centro. O azul representa o Caribe e o céu; o ouro, o sol; o preto e branco, as duas raças em harmonia. Os dois triângulos representam os Pitons — o Gros Piton e o Petit Piton —, as icônicas montanhas vulcânicas da ilha, Património da UNESCO. Adotada em 1979." },
  { iso:"VC", name:"S. Vicente e Granadinas", continent:"north-america", flag:"🇻🇨", type:"país",   desc:"A bandeira de São Vicente e Granadinas tem três faixas verticais — azul, amarela e verde — com três losangos verdes dispostos em V no campo amarelo. O azul representa o céu e o mar; o amarelo, a areia dourada e o sol; e o verde, a vegetação tropical exuberante. O V formado pelos losangos representa 'Vicente' e os três losangos, as três ilhas principais do arquipélago. Adotada na forma atual em 1985." },
  { iso:"TT", name:"Trinidad e Tobago",   continent:"north-america", flag:"🇹🇹", type:"país",       desc:"A bandeira de Trinidad e Tobago tem fundo vermelho com uma faixa diagonal preta bordeada de branco, do canto superior esquerdo ao inferior direito. O vermelho representa o fogo do sol, a vitalidade e a coragem do povo; o preto, a dedicação e a força da terra; e o branco, a pureza e o mar. A diagonal simboliza as duas ilhas. Adotada na independência do Reino Unido em 1962." },
  { iso:"US", name:"Estados Unidos",      continent:"north-america", flag:"🇺🇸", type:"país",       desc:"A bandeira dos Estados Unidos tem 13 faixas alternadas vermelhas e brancas e um canton azul com 50 estrelas brancas dispostas em fileiras. As 13 faixas representam as 13 colônias originais que declararam independência em 1776. As 50 estrelas representam os 50 estados atuais. O vermelho simboliza valentia; o branco, pureza; e o azul, vigilância e perseverança. A última atualização foi em 1960, com a admissão do Havaí." },
  { iso:"PR", name:"Porto Rico",          continent:"north-america", flag:"🇵🇷", type:"território", desc:"A bandeira de Porto Rico tem cinco faixas horizontais alternadas vermelhas e brancas com um triângulo equilátero azul à esquerda e uma estrela branca de cinco pontas. O vermelho e branco vêm dos movimentos independentistas cubano e porto-riquenho; o triângulo azul representa os três poderes; e a estrela simboliza a ilha. Porto Rico é um Estado Livre Associado (território não incorporado) dos EUA desde 1952." },
  { iso:"GL", name:"Groenlândia",         continent:"north-america", flag:"🇬🇱", type:"território", desc:"A bandeira da Groenlândia tem metade superior branca e metade inferior vermelha, com um círculo dividido em semicírculo vermelho (acima, sobre o campo branco) e branco (abaixo, sobre o campo vermelho). O branco representa os glaciais e a neve que cobrem 80% da ilha; o vermelho, o sol ártico e o oceano. É território autônomo do Reino da Dinamarca e sua bandeira foi adotada em 1985." },
  { iso:"TC", name:"Ilhas Turks e Caicos", continent:"north-america", flag:"🇹🇨", type:"território", desc:"A bandeira das Ilhas Turks e Caicos tem o Blue Ensign britânico com o brasão local no lado direito, mostrando uma lesma-do-mar espinhosa, uma lagosta e um cacto sobre fundo amarelo. As Turks e Caicos são território britânico ultramarino no Caribe. O cacto representa a flora local xerófita; a lagosta, a principal atividade pesqueira. O Blue Ensign reflete a soberania britânica. Adotada em 1968." },
  { iso:"KY", name:"Ilhas Cayman",        continent:"north-america", flag:"🇰🇾", type:"território", desc:"A bandeira das Ilhas Cayman tem o Blue Ensign britânico com brasão local mostrando três estrelas azuis (as três ilhas), uma tartaruga verde e um leão dourado segurando uma cabeça de tartaruga. As três ilhas são Grande Cayman, Cayman Brac e Little Cayman. A tartaruga é símbolo histórico das ilhas, que eram chamadas 'Las Tortugas' pelos espanhóis. Território britânico ultramarino. Adotada em 1958." },
  { iso:"VG", name:"Ilhas Virgens Brit.", continent:"north-america", flag:"🇻🇬", type:"território", desc:"A bandeira das Ilhas Virgens Britânicas tem o Blue Ensign com brasão local mostrando Santa Úrsula com lâmpada dourada rodeada de onze lâmpadas menores. Santa Úrsula é a patrona das ilhas, associada à lenda das 11 mil virgens mártires. Território britânico ultramarino no Caribe, com autonomia interna. As ilhas foram nomeadas por Cristóvão Colombo em homenagem às virgens mártires. Adotada em 1960." },
  { iso:"VI", name:"Ilhas Virgens EUA",   continent:"north-america", flag:"🇻🇮", type:"território", desc:"A bandeira das Ilhas Virgens dos EUA tem fundo branco com a águia americana simplificada carregando escudo azul e ramos de louro e palmeira, com as iniciais 'VI' amarelas. A águia é o símbolo nacional dos EUA. As ilhas foram compradas da Dinamarca em 1917 por 25 milhões de dólares, em ouro. Território americano não incorporado no Caribe. Adotada em 1921." },
  { iso:"CW", name:"Curaçao",             continent:"north-america", flag:"🇨🇼", type:"território", desc:"A bandeira de Curaçao tem fundo azul com uma faixa horizontal amarela no terço inferior e duas estrelas brancas de cinco pontas. O azul representa o mar e o céu; o amarelo, o sol; e as duas estrelas, os dois componentes do território: a ilha de Curaçao e o ilhéu Klein Curaçao. País constituinte autônomo do Reino dos Países Baixos desde 2010. Adotada em 1984." },
  { iso:"AW", name:"Aruba",              continent:"north-america", flag:"🇦🇼", type:"território", desc:"A bandeira de Aruba tem fundo azul com duas faixas horizontais amarelas finas na base e uma estrela vermelha de quatro pontas bordeada de branco no canto superior esquerdo. O azul representa o mar e o céu; o amarelo, a indústria turística e as flores de kibrahacha; e a estrela vermelha, as quatro direções do vento. País constituinte autônomo do Reino dos Países Baixos. Adotada em 1976." },

  // ── AMÉRICA DO SUL ──
  { iso:"AR", name:"Argentina",           continent:"south-america", flag:"🇦🇷", type:"país",       desc:"A bandeira da Argentina tem três faixas horizontais — azul celeste, branca e azul celeste — com o Sol de Maio dourado no centro. O azul celeste e o branco foram as cores do Virreinato del Río de la Plata. O Sol de Maio representa Inti, o deus solar inca, e a Revolução de Maio de 1810. Criada pelo General Manuel Belgrano em 1812 e oficializada em 1816, com a Declaração de Independência." },
  { iso:"BO", name:"Bolívia",             continent:"south-america", flag:"🇧🇴", type:"país",       desc:"A bandeira da Bolívia tem três faixas horizontais — vermelha (superior), amarela e verde — com brasão nacional no centro na versão oficial. O vermelho representa o sangue dos soldados bolivianos; o amarelo, os recursos minerais; e o verde, as riquezas naturais. As cores têm raízes no movimento independentista do início do século XIX. A versão civil não tem brasão. Adotada em 1851." },
  { iso:"BR", name:"Brasil",             continent:"south-america", flag:"🇧🇷", type:"país",       desc:"A bandeira do Brasil tem fundo verde com losango amarelo e disco azul central, com 27 estrelas brancas dispostas em constelações e a faixa branca com 'Ordem e Progresso'. O verde representa as florestas; o amarelo, as riquezas minerais; e o azul, o céu do Rio de Janeiro na manhã de 15 de novembro de 1889. As 27 estrelas representam os 26 estados e o Distrito Federal. Adotada em 1889, inspirada no positivismo de Augusto Comte." },
  { iso:"CL", name:"Chile",              continent:"south-america", flag:"🇨🇱", type:"país",       desc:"A bandeira do Chile tem duas faixas horizontais — branca (superior) e vermelha (inferior) — com quadrado azul no canto superior esquerdo e estrela branca de cinco pontas. O azul representa o céu; o branco, a neve dos Andes; e o vermelho, o sangue dos patriotas que lutaram pela independência. A estrela simboliza um guia para o progresso e a honra. Adotada em 1817, após a Declaração de Independência." },
  { iso:"CO", name:"Colômbia",           continent:"south-america", flag:"🇨🇴", type:"país",       desc:"A bandeira da Colômbia tem três faixas horizontais — amarela (metade superior), azul e vermelha. O amarelo representa a riqueza do solo, o sol e a soberania; o azul, os oceanos Atlântico e Pacífico e os rios; e o vermelho, o sangue dos mártires da independência. As cores foram criadas por Francisco de Miranda e compartilhadas com Venezuela e Equador — os três países libertados por Simón Bolívar. Adotada em 1861." },
  { iso:"EC", name:"Equador",            continent:"south-america", flag:"🇪🇨", type:"país",       desc:"A bandeira do Equador tem três faixas horizontais — amarela (metade superior), azul e vermelha — com brasão nacional no centro. Compartilha as cores da antiga Gran Colombia. O amarelo representa a riqueza natural e o sol tropical; o azul, o céu e os mares; e o vermelho, o sangue dos heróis. O brasão inclui o Chimborazo, um barco a vapor e o sol com os signos zodiacais. Adotada em 1860." },
  { iso:"GY", name:"Guiana",             continent:"south-america", flag:"🇬🇾", type:"país",       desc:"A bandeira da Guiana tem fundo verde com triângulo dourado (bordeado de branco) e triângulo vermelho menor (bordeado de preto) sobrepostos no centro. O verde representa as florestas; o dourado, os recursos minerais; o branco, os rios; o vermelho, o entusiasmo e o dinamismo; e o preto, a perseverança. Conhecida como 'A Flecha Dourada', é considerada uma das mais bonitas da América. Adotada na independência do Reino Unido em 1966." },
  { iso:"PY", name:"Paraguai",           continent:"south-america", flag:"🇵🇾", type:"país",       desc:"A bandeira do Paraguai tem três faixas horizontais — vermelha, branca e azul — com emblemas diferentes nos dois lados, sendo a única bandeira bilateral oficial do mundo. Na frente, o Leão de Paraguai e a estrela; no verso, o Tesouro do Estado e a planta de caucho. O vermelho representa a justiça; o branco, a paz; e o azul, a liberdade. Adotada em 1842." },
  { iso:"PE", name:"Peru",              continent:"south-america", flag:"🇵🇪", type:"país",       desc:"A bandeira do Peru tem três faixas verticais — vermelha, branca e vermelha — com brasão nacional no centro na versão oficial. O vermelho representa o sangue derramado pelos heróis da independência e o branco, a paz. O brasão inclui a vicunha, a árvore da quina e a cornucópia de moedas, representando a fauna, a flora e os minerais. As cores foram escolhidas por José de San Martín em 1820." },
  { iso:"SR", name:"Suriname",           continent:"south-america", flag:"🇸🇷", type:"país",       desc:"A bandeira do Suriname tem cinco faixas horizontais — verde, branco, vermelha (mais larga), branco e verde — com estrela amarela de cinco pontas no centro. O verde representa as florestas e a esperança; o branco, a paz; e o vermelho, o progresso e o amor. A estrela dourada simboliza a unidade das cinco principais raças e culturas do Suriname. Adotada na independência dos Países Baixos em 1975." },
  { iso:"UY", name:"Uruguai",            continent:"south-america", flag:"🇺🇾", type:"país",       desc:"A bandeira do Uruguai tem nove faixas horizontais alternadas brancas e azuis com canton branco e Sol de Maio dourado. As nove faixas representam os nove departamentos originais. O branco e azul são as cores históricas uruguaias. O Sol de Maio (idêntico ao da Argentina) representa a Revolução de Maio de 1810 e o sol no horizonte da liberdade. Adotada em 1830." },
  { iso:"VE", name:"Venezuela",          continent:"south-america", flag:"🇻🇪", type:"país",       desc:"A bandeira da Venezuela tem três faixas horizontais — amarela, azul e vermelha — com oito estrelas brancas em arco na faixa azul e brasão nacional. O amarelo representa as riquezas e as terras; o azul, o oceano Atlântico; e o vermelho, o sangue dos patriotas. As oito estrelas representam as oito províncias que assinaram a declaração de independência em 1811. Adotada na forma atual em 2006." },
  { iso:"GF", name:"Guiana Francesa",    continent:"south-america", flag:"🇬🇫", type:"território", desc:"A Guiana Francesa usa a bandeira da França — tricolor vertical azul, branco e vermelho. É um departamento e região ultramarino francês na costa nordeste da América do Sul, fazendo parte da UE. Partilha a bandeira metropolitana francesa; existe um pavilhão regional não oficial com sol e estrela verde. O azul representa a liberdade; o branco, a igualdade; o vermelho, a fraternidade. Status de departamento francês desde 1946." },
  { iso:"FK", name:"Ilhas Malvinas",     continent:"south-america", flag:"🇫🇰", type:"território", desc:"A bandeira das Ilhas Malvinas (Falkland Islands) tem o Blue Ensign britânico com brasão local mostrando um veleiro e um carneiro sobre fundo branco. O veleiro representa o Desire, primeiro navio a alcançar as ilhas em 1592. O carneiro simboliza a pecuária, principal atividade econômica histórica. As ilhas são território britânico ultramarino disputado com a Argentina, que as reivindica. O brasão foi adotado em 1948." },

  // ── OCEANIA ──
  { iso:"AU", name:"Austrália",          continent:"oceania", flag:"🇦🇺", type:"país",       desc:"A bandeira da Austrália tem fundo azul escuro (Blue Ensign) com a Union Jack britânica no canto superior esquerdo, a Estrela da Comunidade de sete pontas abaixo dela e a Cruz do Sul de cinco estrelas à direita. A União Jack reflete os laços históricos com a Grã-Bretanha. A Estrela da Comunidade representa os seis estados e os territórios. A Cruz do Sul indica o posicionamento no hemisfério sul. Adotada em 1901, com a federação." },
  { iso:"FJ", name:"Fiji",              continent:"oceania", flag:"🇫🇯", type:"país",       desc:"A bandeira de Fiji tem fundo azul-celeste claro (diferente do Blue Ensign padrão) com a Union Jack britânica no canto superior esquerdo e o brasão nacional à direita. O brasão mostra um leão britânico segurando um cacau e produtos coloniais. O azul representa o oceano Pacífico; o leão, o legado britânico. O cacau e a cana-de-açúcar refletem as principais culturas históricas. Adotada na independência em 1970." },
  { iso:"KI", name:"Kiribati",          continent:"oceania", flag:"🇰🇮", type:"país",       desc:"A bandeira de Kiribati tem metade superior vermelha com sol nascente amarelo de 17 raios e um pássaro fregata em voo acima, e metade inferior de ondas onduladas azuis e brancas. O vermelho e o sol representam o oceano Pacífico ao amanhecer; as ondas, o oceano. A fregata simboliza força e liberdade. Kiribati é um dos primeiros países a ver o nascer do sol todos os dias. Adotada na independência em 1979." },
  { iso:"MH", name:"Ilhas Marshall",    continent:"oceania", flag:"🇲🇭", type:"país",       desc:"A bandeira das Ilhas Marshall tem fundo azul escuro com diagonal laranja e branca do canto inferior esquerdo ao superior direito, e uma estrela branca de 24 pontas no canto superior esquerdo. O azul representa o Pacífico; o laranja, o valor e a riqueza; e o branco, a paz. A diagonal representa o equador; as 24 pontas da estrela, os 24 distritos eleitorais. Adotada na independência em 1979." },
  { iso:"FM", name:"Micronésia",        continent:"oceania", flag:"🇫🇲", type:"país",       desc:"A bandeira da Micronésia tem fundo azul-celeste claro com quatro estrelas brancas de cinco pontas dispostas em losango. O azul representa o oceano Pacífico e a paz. As quatro estrelas representam os quatro estados da federação: Chuuk, Pohnpei, Kosrae e Yap. Foi inspirada na bandeira das Nações Unidas, cujo azul foi adotado como símbolo de paz. Adotada na independência em 1979." },
  { iso:"NR", name:"Nauru",             continent:"oceania", flag:"🇳🇷", type:"país",       desc:"A bandeira de Nauru tem fundo azul escuro com uma faixa horizontal dourada (representando o equador) e uma estrela branca de 12 pontas abaixo dela. O azul representa o oceano Pacífico; a faixa dourada, o equador (Nauru fica logo abaixo dele); e a estrela branca, a ilha em si. As 12 pontas simbolizam as 12 tribos nauruas originais. Adotada na independência em 1968." },
  { iso:"NZ", name:"Nova Zelândia",     continent:"oceania", flag:"🇳🇿", type:"país",       desc:"A bandeira da Nova Zelândia tem fundo azul (Blue Ensign) com a Union Jack no canto superior esquerdo e quatro estrelas vermelhas bordeadas de branco formando a Cruz do Sul. As estrelas vermelhas distinguem-na da bandeira australiana (que usa estrelas brancas). O azul representa o Pacífico; a Union Jack, os laços britânicos; a Cruz do Sul, o hemisfério sul. Adotada em 1902." },
  { iso:"PW", name:"Palau",             continent:"oceania", flag:"🇵🇼", type:"país",       desc:"A bandeira de Palau tem fundo azul-celeste claro com um disco dourado deslocado ligeiramente para a esquerda. O azul representa a transição para a auto-governança e o oceano Pacífico. O círculo dourado representa a lua cheia, considerada sagrada pelos palausianos como o momento ideal para pescar, plantar e celebrar cerimônias tradicionais. Adotada na independência em 1981." },
  { iso:"PG", name:"Papua Nova Guiné",  continent:"oceania", flag:"🇵🇬", type:"país",       desc:"A bandeira de Papua Nova Guiné tem diagonal do canto superior direito ao inferior esquerdo, com triângulo vermelho (superior) e preto (inferior). No vermelho, o pássaro-do-paraíso dourado em voo; no preto, a Cruz do Sul de cinco estrelas. O vermelho e preto são cores tradicionais das tribos locais. O pássaro-do-paraíso é o símbolo nacional; a Cruz do Sul, a posição geográfica. Adotada na independência em 1975." },
  { iso:"WS", name:"Samoa",             continent:"oceania", flag:"🇼🇸", type:"país",       desc:"A bandeira de Samoa tem fundo vermelho com um retângulo azul no canto superior esquerdo contendo a Cruz do Sul de cinco estrelas brancas (quatro de cinco pontas e uma de quatro pontas). O vermelho representa a coragem e o sacrifício; o azul, a liberdade; e o branco, a pureza. A Cruz do Sul é símbolo geográfico e espiritual do Pacífico Sul. Samoa foi o primeiro país polinésio a se tornar independente, em 1962." },
  { iso:"SB", name:"Ilhas Salomão",     continent:"oceania", flag:"🇸🇧", type:"país",       desc:"A bandeira das Ilhas Salomão tem diagonal azul no canto superior esquerdo e verde no inferior direito, com faixa diagonal amarela entre elas e cinco estrelas brancas de cinco pontas no campo azul. O azul representa o oceano; o verde, as terras e as florestas; e o amarelo, o sol. As cinco estrelas representam os cinco principais grupos de ilhas. Adotada na independência do Reino Unido em 1978." },
  { iso:"TO", name:"Tonga",             continent:"oceania", flag:"🇹🇴", type:"país",       desc:"A bandeira de Tonga tem fundo vermelho com canton branco no canto superior esquerdo contendo uma cruz vermelha. O vermelho representa o sangue de Cristo e a solidariedade cristã profunda da nação. O branco simboliza a pureza e a paz. A cruz reflete o Cristianismo levado pelos missionários europeus no século XIX. Adotada em 1875 e estabelecida pela Constituição de Tonga como imutável para sempre." },
  { iso:"TV", name:"Tuvalu",            continent:"oceania", flag:"🇹🇻", type:"país",       desc:"A bandeira de Tuvalu tem fundo azul-celeste (Blue Ensign modificado) com a Union Jack no canto superior esquerdo e nove estrelas amarelas de cinco pontas à direita. Cada estrela representa uma das nove ilhas habitadas do arquipélago, posicionadas de acordo com a localização geográfica real. A Union Jack reflete a história como território britânico. Adotada na independência em 1978, modificada em 1997." },
  { iso:"VU", name:"Vanuatu",           continent:"oceania", flag:"🇻🇺", type:"país",       desc:"A bandeira de Vanuatu tem duas faixas horizontais — vermelha (superior) e verde (inferior) — com faixa preta vertical à esquerda bordeada de amarelo e o símbolo de uma defensa de dente de porco com folhas de samambaia no campo preto. O verde representa as riquezas da terra; o vermelho, o sangue; e o preto, a herança melanésia. A defensa de porco é objeto ritual importante na cultura local. Adotada na independência em 1980." },
  { iso:"NC", name:"Nova Caledônia",    continent:"oceania", flag:"🇳🇨", type:"território", desc:"A Nova Caledônia usa a bandeira da França — tricolor vertical azul, branco e vermelho. É uma coletividade especial francesa no Pacífico Sul. O movimento independentista Kanak usa uma bandeira própria com cores tradicionais, mas a bandeira oficial do território é a francesa. Após três referendos (2018, 2020, 2021), a população votou por permanecer parte da França. Status de coletividade especial desde 1998." },
  { iso:"PF", name:"Polinésia Francesa", continent:"oceania", flag:"🇵🇫", type:"território", desc:"A Polinésia Francesa usa a bandeira da França — tricolor vertical azul, branco e vermelho. É uma coletividade ultramarino francesa no Pacífico Sul, abrangendo mais de 100 ilhas incluindo Tahiti e Bora Bora. O azul representa a liberdade; o branco, a igualdade; o vermelho, a fraternidade. Tem um pavilhão local com canoa polinésia, mas a bandeira oficial é a francesa. Autonomia ampliada desde 2004." },
  { iso:"CK", name:"Ilhas Cook",        continent:"oceania", flag:"🇨🇰", type:"território", desc:"A bandeira das Ilhas Cook tem fundo azul (Blue Ensign) com a Union Jack no canto superior esquerdo e quinze estrelas brancas de cinco pontas dispostas em círculo. As quinze estrelas representam as quinze ilhas habitadas do arquipélago. As Ilhas Cook são território autônomo em livre associação com a Nova Zelândia, cujos cidadãos têm passaporte neozelandês. Adotada em 1979." },
  { iso:"WF", name:"Wallis e Futuna",   continent:"oceania", flag:"🇼🇫", type:"território", desc:"Wallis e Futuna usa a bandeira da França — tricolor vertical azul, branco e vermelho. É uma coletividade ultramarina francesa composta por três reinos polinésios tradicionais: Uvea (Wallis), Sigave e Alo (Futuna e Alofi). O azul, o branco e o vermelho representam os ideais da República Francesa. Existe um pavilhão local com cruzes vermelhas, mas sem status oficial. Coletividade francesa desde 1961." },
  { iso:"AS", name:"Samoa Americana",   continent:"oceania", flag:"🇦🇸", type:"território", desc:"A bandeira da Samoa Americana tem fundo azul com triângulo vermelho bordeado de branco no lado esquerdo contendo uma águia americana dourada segurando um flyfly (vara cerimonial) e um uatogi (bastão de guerra). A águia americana representa a soberania dos EUA. O flyfly e o uatogi são instrumentos cerimoniais samoanos que simbolizam a sabedoria e a autoridade dos chefes tradicionais. Território americano não incorporado. Adotada em 1960." },
  { iso:"GU", name:"Guam",              continent:"oceania", flag:"🇬🇺", type:"território", desc:"A bandeira de Guam tem fundo azul com borda vermelha fina e um escudo oval no centro, mostrando uma proa de canoa chamoru numa baía com palmeira e penhascos ao fundo, com 'GUAM' inscrito em vermelho. O azul representa o oceano; o vermelho, a luta histórica do povo chamoru contra a colonização. O escudo retrata a beleza natural e a identidade única. Território americano não incorporado no Pacífico. Adotada em 1948." },
];

// ================================================================
//  CONTINENTES
// ================================================================
const CONTINENTS = [
  { key:"all",           label:"Todos",         emoji:"🌐", color:"var(--c-all)"           },
  { key:"africa",        label:"África",         emoji:"🌍", color:"var(--c-africa)"        },
  { key:"asia",          label:"Ásia",           emoji:"🌏", color:"var(--c-asia)"          },
  { key:"europe",        label:"Europa",         emoji:"🌍", color:"var(--c-europe)"        },
  { key:"north-america", label:"Am. do Norte",   emoji:"🌎", color:"var(--c-north-america)" },
  { key:"south-america", label:"Am. do Sul",     emoji:"🌎", color:"var(--c-south-america)" },
  { key:"oceania",       label:"Oceania",        emoji:"🌏", color:"var(--c-oceania)"       },
];

// Lookup de cor por continente (derivado de CONTINENTS — sem duplicação)
const CONT_COLOR = Object.fromEntries(CONTINENTS.slice(1).map(c => [c.key, c.color]));

// ================================================================
//  PRÉ-PROCESSAMENTO — listas ordenadas por continente (executa 1x)
// ================================================================
const collator = new Intl.Collator('pt-BR');
const SORTED = {
  all: [...COUNTRIES].sort((a, b) => collator.compare(a.name, b.name)),
};
CONTINENTS.slice(1).forEach(({ key }) => {
  SORTED[key] = SORTED.all.filter(c => c.continent === key);
});

// ================================================================
//  ESTADO E REFS DOM
// ================================================================
let activeContinent = 'all';
let activeBtn       = null;

const $grid   = document.getElementById('grid');
const $empty  = document.getElementById('empty');
const $stats  = document.getElementById('stats');
const $search = document.getElementById('search');

// ================================================================
//  BUILD FILTERS
// ================================================================
function buildFilters() {
  const wrap = document.getElementById('filters');
  CONTINENTS.forEach(c => {
    const count = SORTED[c.key]?.length ?? COUNTRIES.length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (c.key === 'all' ? ' active' : '');
    btn.dataset.cont = c.key;

    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = c.color;
    btn.appendChild(dot);
    btn.append(`${c.emoji} ${c.label} (${count})`);

    btn.addEventListener('click', () => {
      if (activeBtn) activeBtn.classList.remove('active');
      btn.classList.add('active');
      activeBtn = btn;
      activeContinent = c.key;
      applyFilters();
    });

    if (c.key === 'all') activeBtn = btn;
    wrap.appendChild(btn);
  });
}

// ================================================================
//  RENDER GRID
// ================================================================
function applyFilters() {
  const q = $search.value.toLowerCase().trim();
  let list = SORTED[activeContinent];

  if (q) {
    list = list.filter(c =>
      c.name.toLowerCase().includes(q) || c.iso.toLowerCase().includes(q)
    );
  }

  // Limpa cards anteriores mantendo o #empty no grid
  $grid.replaceChildren($empty);

  if (list.length === 0) {
    $empty.style.display = 'block';
    $stats.textContent = '';
    return;
  }

  $empty.style.display = 'none';
  $stats.textContent = `${list.length} ${activeContinent === 'all' ? 'países e territórios' : 'países'}${q ? ` com "${q}"` : ''}`;

  const frag = document.createDocumentFragment();
  list.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'flag-card';
    card.style.animationDelay = `${Math.min(i * 18, 300)}ms`;
    card.innerHTML =
      `<div class="flag-cont-dot" style="background:${CONT_COLOR[c.continent]}"></div>` +
      `<div class="flag-emoji">${c.flag}</div>` +
      `<div class="flag-name">${c.name}</div>` +
      `<div class="flag-iso">${c.iso}</div>`;
    card.addEventListener('click', () => openDetail(c));
    frag.appendChild(card);
  });
  $grid.appendChild(frag);
}

// ================================================================
//  DETAIL STRIP
// ================================================================
const $strip   = document.getElementById('detail-strip');
const $flagImg = document.getElementById('detail-flag-img');
const $flagEmo = document.getElementById('detail-flag-emoji');
const $dName   = document.getElementById('detail-name');
const $dType   = document.getElementById('detail-type');
const $dBadge  = document.getElementById('detail-continent-badge');
const $dDesc   = document.getElementById('detail-desc');
const $dWrap   = document.getElementById('detail-flag-wrap');

function openDetail(c) {
  // flag image via flagcdn (fallback to emoji)
  const imgSrc = `https://flagcdn.com/w320/${c.iso.toLowerCase()}.png`;
  $flagImg.src = imgSrc;
  $flagImg.alt = c.name;
  $flagImg.style.display = 'block';
  $flagEmo.style.display = 'none';
  $flagImg.onerror = () => {
    $flagImg.style.display = 'none';
    $flagEmo.style.display = 'block';
    $flagEmo.textContent = c.flag;
  };

  $dName.textContent = c.name;
  $dType.textContent = c.type === 'território' ? 'Território' : 'País';

  const cont = CONTINENTS.find(ct => ct.key === c.continent);
  $dBadge.textContent = cont ? cont.label : c.continent;
  $dBadge.style.background = CONT_COLOR[c.continent] ?? '#e5e7eb';

  // glow color from CSS variable
  const glowRaw = getComputedStyle(document.documentElement)
    .getPropertyValue(`--c-${c.continent}`).trim();
  $dWrap.style.setProperty('--glow', glowRaw + '55'); // 55 = ~33% opacity hex

  $dDesc.textContent = c.desc ?? '';
  $strip.classList.add('open');
  $strip.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeDetail() {
  $strip.classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// ================================================================
//  INIT
// ================================================================
buildFilters();
applyFilters();
</script>

</body>
</html>
