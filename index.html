<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bandeiras do Mundo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏳️</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #181818;
  --bg2:     #222222;
  --card:    #ffffff;
  --border:  #333333;
  --text:    #f5f5f5;
  --text2:   #888888;
  --accent:  #6366f1;
  --radius:  14px;

  --c-africa:        #e8895a;
  --c-asia:          #e05c5c;
  --c-europe:        #2fbfad;
  --c-north-america: #d4a94e;
  --c-south-america: #4daf7c;
  --c-oceania:       #4da6d4;
  --c-all:           #6366f1;
}

html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 20;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 12px;
}

.header-top {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 14px;
}

header h1 { font-size: 18px; font-weight: 700; flex: 1; }

.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 14px; pointer-events: none; opacity: 0.45;
}
#search {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 7px 12px 7px 30px;
  font-size: 14px; color: var(--text);
  width: 220px; outline: none;
  transition: border-color 0.2s;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--text2); }

/* ── CONTINENT FILTERS ── */
.filters {
  display: flex; gap: 8px; flex-wrap: wrap;
}

.filter-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 14px;
  border-radius: 100px;
  border: 1.5px solid transparent;
  background: var(--bg);
  color: var(--text2);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: color 0.18s, background 0.18s, border-color 0.18s;
  white-space: nowrap;
}

.filter-btn .dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
}

.filter-btn:hover {
  color: var(--text);
  border-color: currentColor;
}

.filter-btn.active {
  color: #fff;
  border-color: transparent;
}

.filter-btn[data-cont="all"].active      { background: var(--c-all); }
.filter-btn[data-cont="africa"].active   { background: var(--c-africa); }
.filter-btn[data-cont="asia"].active     { background: var(--c-asia); }
.filter-btn[data-cont="europe"].active   { background: var(--c-europe); }
.filter-btn[data-cont="north-america"].active { background: var(--c-north-america); }
.filter-btn[data-cont="south-america"].active { background: var(--c-south-america); }
.filter-btn[data-cont="oceania"].active  { background: var(--c-oceania); }

/* ── STATS BAR ── */
#stats {
  padding: 10px 20px 0;
  font-size: 13px; color: var(--text2);
}

/* ── GRID ── */
#grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 20px;
  padding: 18px 24px 48px;
}

.flag-card {
  position: relative;
  background: var(--card);
  border: 1.5px solid #e5e7eb;
  border-radius: var(--radius);
  padding: 35px 18px 25px;
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  animation: fadeIn 0.2s ease both;
  user-select: none;
}

.flag-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  border-color: var(--accent);
}

.flag-emoji {
  font-size: 90px;
  line-height: 1;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2));
}

.flag-name {
  font-size: 15px; font-weight: 700;
  text-align: center; line-height: 1.35;
  color: #111827;
}

.flag-iso {
  font-size: 12px; font-weight: 700;
  font-family: 'SF Mono', Menlo, monospace;
  padding: 3px 9px;
  border-radius: 5px;
  background: #f3f4f6;
  border: 1px solid #e5e7eb;
  color: #6b7280;
  letter-spacing: 0.05em;
}

.flag-cont-dot {
  width: 7px; height: 7px; border-radius: 50%;
  position: absolute; top: 10px; right: 10px;
}

/* ── EMPTY ── */
#empty {
  display: none;
  grid-column: 1/-1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
  font-size: 17px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── DETAIL STRIP ── */
#detail-strip {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.42s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
  background: #08080f;
  border-bottom: 1px solid #1e1e2e;
  /* grid-line pattern */
  background-image:
    linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size: 48px 48px;
}
#detail-strip.open {
  max-height: 480px;
  opacity: 1;
}

#detail-strip-inner {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 52px;
  padding: 44px 60px 48px;
  align-items: center;
  position: relative;
  max-width: 1100px;
  margin: 0 auto;
}

#detail-close {
  position: absolute; top: 16px; right: 24px;
  font-size: 22px; line-height: 1;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; cursor: pointer; color: #9ca3af;
  padding: 4px 10px;
  transition: background 0.15s, color 0.15s;
}
#detail-close:hover { background: rgba(255,255,255,0.12); color: #f3f4f6; }

#detail-flag-wrap {
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
#detail-flag-wrap::before {
  content: '';
  position: absolute;
  width: 340px; height: 220px;
  background: radial-gradient(ellipse, var(--glow, rgba(99,102,241,0.35)) 0%, transparent 68%);
  filter: blur(28px);
  z-index: 0;
  pointer-events: none;
}
#detail-flag-img {
  width: 280px; height: auto;
  border-radius: 6px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  position: relative; z-index: 1;
  display: block;
}
#detail-flag-emoji {
  font-size: 200px; line-height: 1;
  display: none;
  position: relative; z-index: 1;
}

#detail-name {
  font-size: 32px; font-weight: 800;
  color: #f9fafb; margin: 0 0 14px;
  letter-spacing: -0.5px;
}

#detail-badges {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 20px;
}
#detail-type, #detail-continent-badge {
  border-radius: 999px;
  padding: 5px 14px;
  font-size: 12px; font-weight: 700;
  display: inline-block;
}
#detail-type { background: var(--accent); color: #fff; }
#detail-continent-badge { color: #111; }

#detail-desc {
  font-size: 15px; line-height: 1.8;
  color: #9ca3af; margin: 0;
}

/* ── MOBILE ── */
@media (max-width: 900px) {
  #grid { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 700px) {
  #detail-strip.open { max-height: 700px; }
  #detail-strip-inner {
    grid-template-columns: 1fr;
    padding: 32px 20px 36px;
    gap: 28px;
  }
  #detail-flag-img { width: 180px; }
}

@media (max-width: 600px) {
  header { padding: 12px 14px 10px; }
  .header-top { margin-bottom: 10px; }
  header h1 { font-size: 15px; }
  #search { width: 150px; }
  #grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px 14px 32px; }
  .flag-emoji { font-size: 65px; }
  .flag-card { padding: 25px 12px 18px; }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🏳️ Bandeiras do Mundo</h1>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search" type="text" placeholder="Buscar país ou código…" oninput="applyFilters()">
    </div>
  </div>
  <div class="filters" id="filters"></div>
</header>

<div id="stats"></div>

<div id="detail-strip">
  <div id="detail-strip-inner">
    <div id="detail-flag-wrap">
      <img id="detail-flag-img" src="" alt="">
      <span id="detail-flag-emoji"></span>
    </div>
    <div id="detail-info">
      <div id="detail-badges">
        <span id="detail-type"></span>
        <span id="detail-continent-badge"></span>
      </div>
      <h2 id="detail-name"></h2>
      <p id="detail-desc"></p>
    </div>
    <button id="detail-close" onclick="closeDetail()">×</button>
  </div>
</div>

<div id="grid">
  <div id="empty">Nenhum país encontrado para essa busca.</div>
</div>

<script>
// ================================================================
//  DATASET — 249 países e territórios (pt-BR)
// ================================================================
const COUNTRIES = [
  // ── ÁFRICA ──
  { iso:"DZ", name:"Argélia",             continent:"africa", flag:"🇩🇿", type:"país",       desc:"A bandeira da Argélia é dividida verticalmente em verde e branco, com um crescente e uma estrela vermelhos no centro. O verde simboliza o Islã e a prosperidade da terra, enquanto o branco representa a pureza e a paz. O crescente e a estrela são símbolos clássicos da fé islâmica, presente no país desde a expansão árabe no século VII. A bandeira foi adotada em 1962, com a independência da França após uma longa guerra." },
  { iso:"AO", name:"Angola",              continent:"africa", flag:"🇦🇴", type:"país",       desc:"A bandeira de Angola tem duas faixas horizontais, vermelha (superior) e preta (inferior), com um emblema amarelo no centro. O emblema é composto por uma roda dentada (operários), um facão (camponeses) e uma estrela de cinco pontas (solidariedade internacional), símbolos inspirados no Partido MPLA. O vermelho representa o sangue derramado na luta pela independência e o preto simboliza o continente africano. Adotada em 1975, com a independência de Portugal." },
  { iso:"BJ", name:"Benin",              continent:"africa", flag:"🇧🇯", type:"país",       desc:"A bandeira do Benin tem uma faixa vertical verde à esquerda e duas faixas horizontais, amarela (superior) e vermelha (inferior), à direita. O verde representa a esperança e o renascimento; o amarelo simboliza a riqueza do país e o vermelho a coragem dos ancestrais. A bandeira foi substituída por uma versão verde sólida durante o regime marxista (1975–1990) e restaurada em 1990, com a redemocratização." },
  { iso:"BW", name:"Botswana",            continent:"africa", flag:"🇧🇼", type:"país",       desc:"A bandeira do Botswana tem fundo azul celeste com uma faixa horizontal preta no centro, bordeada por duas faixas finas brancas. O azul representa a água — recurso precioso num país parcialmente árido —, o preto e o branco simbolizam a harmonia racial entre os diferentes grupos do país. É uma das poucas bandeiras africanas que não usa as cores pan-africanas. Adotada na independência em 1966." },
  { iso:"BF", name:"Burkina Faso",        continent:"africa", flag:"🇧🇫", type:"país",       desc:"A bandeira do Burkina Faso tem duas faixas horizontais, vermelha (superior) e verde (inferior), com uma estrela amarela de cinco pontas no centro. O vermelho representa a revolução e o sangue dos patriotas; o verde simboliza a riqueza agrícola e os recursos naturais. A estrela dourada representa os princípios que guiam o povo. A bandeira foi adotada em 1984, quando o país mudou de nome de Alto Volta para Burkina Faso (que significa 'terra dos homens íntegros')." },
  { iso:"BI", name:"Burundi",             continent:"africa", flag:"🇧🇮", type:"país",       desc:"A bandeira do Burundi é dividida por uma faixa branca em forma de X em quatro triângulos: dois vermelhos (esquerda e direita) e dois verdes (topo e base). No centro há um círculo branco com três estrelas vermelhas bordeadas de verde. As três estrelas representam os três grupos étnicos principais — Hutu, Tutsi e Twa — unidos sob o lema nacional. O vermelho simboliza o sangue dos combatentes e o verde a esperança no futuro. Adotada em 1966." },
  { iso:"CV", name:"Cabo Verde",          continent:"africa", flag:"🇨🇻", type:"país",       desc:"A bandeira de Cabo Verde tem dez faixas horizontais (azul, branco, vermelho, branco e azul alternadas) com um círculo de dez estrelas amarelas deslocado para a esquerda. O azul representa o oceano Atlântico e o céu; o branco, a paz; o vermelho, o esforço e o progresso. As dez estrelas douradas simbolizam as dez ilhas principais do arquipélago. Adotada em 1992, substituindo a bandeira de influência pan-africana do período pós-independência." },
  { iso:"CM", name:"Camarões",            continent:"africa", flag:"🇨🇲", type:"país",       desc:"A bandeira dos Camarões é um tricolor vertical verde, vermelho e amarelo, com uma estrela amarela de cinco pontas no centro. O verde representa o sul florestal do país; o vermelho, a unidade nacional e o sangue pela soberania; o amarelo, as savanas do norte e a riqueza do território. A estrela simboliza a unidade nacional. Adotada com a reunificação do Camarões anglófono e francófono em 1975." },
  { iso:"CF", name:"Rep. Centro-Africana", continent:"africa", flag:"🇨🇫", type:"país",      desc:"A bandeira da República Centro-Africana tem quatro faixas horizontais (azul, branco, verde e amarelo) cortadas por uma faixa vertical vermelha ao centro, com uma estrela amarela no canto superior esquerdo. A faixa vermelha representa o sangue derramado pelos mártires da independência e a fraternidade entre as regiões. O azul simboliza o céu e a liberdade, o branco a paz, o verde as florestas e o amarelo a tolerância e os recursos minerais. Adotada em 1958." },
  { iso:"TD", name:"Chade",               continent:"africa", flag:"🇹🇩", type:"país",       desc:"A bandeira do Chade é um tricolor vertical azul, amarelo e vermelho. O azul representa o céu e a esperança, o amarelo o sol e o deserto do Saara e o vermelho o progresso e o sacrifício pela nação. A bandeira é quase idêntica à da Romênia, diferindo apenas em ligeiras tonalidades de cor — o que levou a disputas diplomáticas. Adotada na independência da França em 1959." },
  { iso:"KM", name:"Comores",             continent:"africa", flag:"🇰🇲", type:"país",       desc:"A bandeira das Comores tem fundo verde com um crescente branco e quatro estrelas brancas, além de quatro faixas diagonais (amarela, branca, vermelha e azul) dividindo a parte inferior. O crescente e as estrelas representam o Islã e as quatro ilhas principais: Grande Comore, Mohéli, Anjouan e Mayotte (reivindicada). Cada cor das faixas representa uma das ilhas. A bandeira foi adotada com a nova constituição em 2001." },
  { iso:"CG", name:"Congo",               continent:"africa", flag:"🇨🇬", type:"país",       desc:"A bandeira do Congo tem triângulos verde e vermelho nas extremidades separados por uma faixa diagonal amarela. O verde representa a riqueza das florestas e a esperança, o amarelo simboliza a amizade e os recursos do país, e o vermelho o sangue dos defensores da pátria. A bandeira foi adotada em 1959 e reintroduzida em 1991, após o fim do regime marxista que usava símbolos comunistas." },
  { iso:"CD", name:"RD Congo",            continent:"africa", flag:"🇨🇩", type:"país",       desc:"A bandeira da República Democrática do Congo tem fundo azul com uma diagonal vermelha bordeada de amarelo do canto inferior esquerdo ao superior direito, e uma estrela amarela no canto superior esquerdo. O azul representa a paz; o vermelho, o sangue dos mártires; o amarelo, as riquezas minerais do país e a estrela, o futuro radiante. Adotada em 2006, substituindo versões anteriores usadas sob Mobutu e durante a guerra civil." },
  { iso:"CI", name:"Costa do Marfim",     continent:"africa", flag:"🇨🇮", type:"país",       desc:"A bandeira da Costa do Marfim é um tricolor vertical laranja, branco e verde. O laranja representa as savanas do norte e o espírito de desenvolvimento nacional; o branco simboliza a paz e a unidade entre os diferentes grupos; o verde evoca as florestas do sul e a esperança no futuro. É o espelho horizontal exato da bandeira da Irlanda. Adotada na independência da França em 1959." },
  { iso:"DJ", name:"Djibuti",             continent:"africa", flag:"🇩🇯", type:"país",       desc:"A bandeira do Djibuti tem um triângulo branco à esquerda com uma estrela vermelha de cinco pontas, e duas faixas horizontais — azul (superior) e verde (inferior). O azul representa o mar e o céu; o verde, a terra e o Islã; o branco, a paz. A estrela vermelha simboliza a unidade dos grupos étnicos e o sangue derramado pelos que lutaram pela independência da França em 1977." },
  { iso:"EG", name:"Egito",              continent:"africa", flag:"🇪🇬", type:"país",       desc:"A bandeira do Egito é um tricolor horizontal vermelho, branco e preto com a Águia de Saladino dourada no centro. O vermelho representa a luta contra a colonização; o branco, a paz; e o preto, os períodos sombrios da ocupação. A Águia de Saladino é símbolo do poder árabe medieval e da força da nação. Adotada em 1984, refletindo a identidade pan-árabe do país." },
  { iso:"GQ", name:"Guiné Equatorial",   continent:"africa", flag:"🇬🇶", type:"país",       desc:"A bandeira da Guiné Equatorial tem três faixas horizontais (verde, branco e vermelho) com triângulo azul à esquerda e o brasão nacional no centro. O verde representa as florestas equatoriais; o branco, a paz; o vermelho, o sangue dos combatentes pela independência e o azul, o oceano Atlântico. O brasão inclui a árvore do algodão de seda, símbolo histórico do país. Adotada na independência da Espanha em 1968." },
  { iso:"ER", name:"Eritreia",            continent:"africa", flag:"🇪🇷", type:"país",       desc:"A bandeira da Eritreia tem um triângulo vermelho à esquerda com um ramo de oliveira dourado, e duas faixas diagonais — verde (superior) e azul (inferior). O verde representa a agropecuária e o progresso; o azul, o mar Vermelho e as riquezas marinhas; o vermelho, o sangue derramado nos 30 anos de luta pela independência da Etiópia. O ramo de oliveira com 30 folhas homenageia esse período de luta. Adotada na independência em 1993." },
  { iso:"SZ", name:"Essuatíni",           continent:"africa", flag:"🇸🇿", type:"país",       desc:"A bandeira do Essuatíni (antigo Suazilândia) tem faixas horizontais azul, vermelho e amarelo, com a faixa vermelha mais larga contendo um escudo africano Nguni preto e branco e lanças tradicionais. O azul representa a paz; o amarelo, os recursos minerais; e o vermelho, as batalhas passadas. O escudo e as lanças simbolizam a proteção da nação. Adotada na independência do Reino Unido em 1968." },
  { iso:"ET", name:"Etiópia",             continent:"africa", flag:"🇪🇹", type:"país",       desc:"A bandeira da Etiópia tem três faixas horizontais verde, amarelo e vermelho com uma estrela azul de cinco pontas e raios dourados no centro. O verde representa a fertilidade e a esperança; o amarelo, a paz e a harmonia; o vermelho, o sangue dos defensores da nação. A estrela azul simboliza a unidade entre as diversas etnias do país. As cores etíopes — as primeiras a serem adotadas — inspiraram dezenas de bandeiras pan-africanas." },
  { iso:"GA", name:"Gabão",              continent:"africa", flag:"🇬🇦", type:"país",       desc:"A bandeira do Gabão tem três faixas horizontais verde, amarelo e azul. O verde representa as florestas equatoriais que cobrem a maior parte do território; o amarelo, o equador que atravessa o país; e o azul, o oceano Atlântico. É uma das bandeiras mais simples da África, sem emblema central. Adotada na independência da França em 1960." },
  { iso:"GM", name:"Gâmbia",             continent:"africa", flag:"🇬🇲", type:"país",       desc:"A bandeira da Gâmbia tem três faixas horizontais — vermelha (superior), azul (central, bordeada por faixas finas brancas) e verde (inferior). O vermelho representa o sol e as savanas; o azul, o Rio Gâmbia, que atravessa o país de leste a oeste; e o verde, as florestas e a agricultura. As faixas brancas simbolizam a unidade e a paz. Adotada na independência do Reino Unido em 1965." },
  { iso:"GH", name:"Gana",              continent:"africa", flag:"🇬🇭", type:"país",       desc:"A bandeira de Gana é um tricolor horizontal vermelho, ouro e verde com uma estrela negra de cinco pontas no centro. O vermelho representa o sangue dos que morreram pela independência; o ouro, as riquezas minerais do país, especialmente o ouro; e o verde, as florestas e a agricultura. A estrela negra é o símbolo da emancipação africana. Gana foi o primeiro país da África subsaariana a se tornar independente, em 1957." },
  { iso:"GN", name:"Guiné",             continent:"africa", flag:"🇬🇳", type:"país",       desc:"A bandeira da Guiné é um tricolor vertical vermelho, amarelo e verde. Usa as cores pan-africanas no mesmo esquema da bandeira da França, mas com cores diferentes. O vermelho representa o sangue dos mártires; o amarelo, o sol e as riquezas do país; e o verde, as florestas e a agricultura. Adotada na independência da França em 1958, foi uma das primeiras bandeiras independentes da África ocidental." },
  { iso:"GW", name:"Guiné-Bissau",       continent:"africa", flag:"🇬🇼", type:"país",       desc:"A bandeira da Guiné-Bissau tem uma faixa vertical vermelha com estrela negra à esquerda, e duas faixas horizontais — amarela (superior) e verde (inferior) — à direita. As cores pan-africanas refletem a identidade do Partido Africano para a Independência da Guiné e Cabo Verde (PAIGC). A estrela negra simboliza a diáspora africana e o povo. Adotada na independência de Portugal em 1973." },
  { iso:"KE", name:"Quênia",             continent:"africa", flag:"🇰🇪", type:"país",       desc:"A bandeira do Quênia tem três faixas horizontais — preta (superior), vermelha (central, bordeada de branco) e verde (inferior) — com um escudo Maasai e duas lanças cruzadas no centro. O preto representa o povo africano; o vermelho, o sangue pela liberdade; o verde, a paisagem natural; e o branco, a paz. O escudo Maasai simboliza a defesa da liberdade conquistada. Adotada na independência do Reino Unido em 1963." },
  { iso:"LS", name:"Lesoto",             continent:"africa", flag:"🇱🇸", type:"país",       desc:"A bandeira do Lesoto tem três faixas horizontais azul, branco e verde com um chapéu tradicional Basotho (mokorotlo) preto no centro. O azul representa o céu e a chuva; o branco, a paz; e o verde, a prosperidade e a terra. O chapéu Basotho é um símbolo cultural fundamental do povo do Lesoto. A bandeira atual foi adotada em 2006, para marcar o 40º aniversário da independência do Reino Unido." },
  { iso:"LR", name:"Libéria",            continent:"africa", flag:"🇱🇷", type:"país",       desc:"A bandeira da Libéria tem onze faixas alternadas vermelhas e brancas com um quadrado azul no canto superior esquerdo contendo uma estrela branca de cinco pontas. O design é diretamente inspirado na bandeira dos Estados Unidos, refletindo as origens do país como colônia de ex-escravos americanos libertos. A estrela branca representa a república independente. Adotada em 1847, é uma das mais antigas repúblicas da África." },
  { iso:"LY", name:"Líbia",              continent:"africa", flag:"🇱🇾", type:"país",       desc:"A bandeira atual da Líbia tem três faixas horizontais — preta (superior), vermelha (central) e verde (inferior) — com crescente e estrela brancos no centro. O preto representa o passado sob colonização; o vermelho, o sangue dos mártires; e o verde, a prosperidade. O crescente e a estrela são símbolos islâmicos. Essa bandeira foi restaurada em 2011 após a queda de Muamar Kadafi, que havia adotado uma bandeira totalmente verde durante seu governo." },
  { iso:"MG", name:"Madagascar",         continent:"africa", flag:"🇲🇬", type:"país",       desc:"A bandeira de Madagascar tem uma faixa vertical branca à esquerda e duas faixas horizontais — vermelha (superior) e verde (inferior) — à direita. O branco representa a pureza; o vermelho, a soberania; e o verde, a esperança. Essas cores refletem as da antiga realeza Merina que governou a ilha antes da colonização francesa. Adotada na independência da França em 1958." },
  { iso:"MW", name:"Malawi",             continent:"africa", flag:"🇲🇼", type:"país",       desc:"A bandeira do Malawi tem três faixas horizontais preta, vermelha e verde com um sol nascente vermelho de 31 raios no centro da faixa preta. O preto representa o povo africano; o vermelho, o sangue dos mártires; e o verde, a natureza. O sol de 31 raios simboliza a aurora de esperança para a África. A bandeira atual foi restaurada em 2012, após uma versão modificada em 2010 ter sido rejeitada pela população." },
  { iso:"ML", name:"Mali",               continent:"africa", flag:"🇲🇱", type:"país",       desc:"A bandeira do Mali é um tricolor vertical verde, amarelo e vermelho. As cores pan-africanas representam esperança e fertilidade (verde), pureza e riqueza mineral (amarelo) e o sangue dos mártires (vermelho). Anteriormente havia uma figura humana negra estilizada (kanaga) no campo amarelo, removida em 1961 por pressão islâmica. Adotada com a independência da França em 1961." },
  { iso:"MR", name:"Mauritânia",         continent:"africa", flag:"🇲🇷", type:"país",       desc:"A bandeira da Mauritânia tem fundo verde com crescente e estrela amarelos, e duas faixas vermelhas horizontais adicionadas no topo e na base em 2017. O verde e os símbolos islâmicos (crescente e estrela) representam a fé muçulmana predominante. As faixas vermelhas foram incluídas em memória do sangue dos defensores da pátria. A bandeira foi adotada originalmente em 1959 e modificada após referendo em 2017." },
  { iso:"MU", name:"Maurício",           continent:"africa", flag:"🇲🇺", type:"país",       desc:"A bandeira de Maurício tem quatro faixas horizontais iguais: vermelha, azul, amarela e verde. O vermelho representa a independência e o sangue derramado; o azul, o oceano Índico que cerca as ilhas; o amarelo, a luz da independência iluminando o futuro; e o verde, a vegetação tropical das ilhas. Adotada na independência do Reino Unido em 1968." },
  { iso:"MA", name:"Marrocos",           continent:"africa", flag:"🇲🇦", type:"país",       desc:"A bandeira de Marrocos tem fundo vermelho com um pentagrama verde de cinco pontas (Selo de Salomão) no centro. O vermelho é a cor histórica dos xerifes marroquinos e das cidades imperiais de Marrakech e Fez. O pentagrama verde, adotado em 1915, representa os cinco pilares do Islã e a ligação com a família real alaouita. É uma das bandeiras mais antigas do mundo árabe em uso contínuo." },
  { iso:"MZ", name:"Moçambique",         continent:"africa", flag:"🇲🇿", type:"país",       desc:"A bandeira de Moçambique tem três faixas horizontais verde, branco (fino), preto, branco (fino) e amarelo, com um triângulo vermelho à esquerda contendo um livro aberto, uma enxada e um fuzil AK-47 com estrela amarela. O verde representa as riquezas naturais; o preto, o continente; o amarelo, os minerais; e o vermelho, a luta pela independência. É a única bandeira nacional com uma arma de fogo moderna. Adotada em 1983." },
  { iso:"NA", name:"Namíbia",            continent:"africa", flag:"🇳🇦", type:"país",       desc:"A bandeira da Namíbia tem uma diagonal azul bordeada de branco, triângulo vermelho no canto inferior esquerdo, triângulo verde no superior direito, e um sol dourado de 12 raios no canto superior esquerdo. O azul representa o oceano Atlântico e o céu; o vermelho, o sangue dos heróis; o verde, a vegetação e a riqueza agrícola; e o amarelo, o sol e os recursos minerais. Adotada na independência da África do Sul em 1990." },
  { iso:"NE", name:"Níger",              continent:"africa", flag:"🇳🇪", type:"país",       desc:"A bandeira do Níger tem três faixas horizontais laranja, branco e verde com um disco laranja no centro da faixa branca. O laranja representa o Deserto do Saara, que cobre mais da metade do território; o branco, a inocência e a pureza; e o verde, os prados e as florestas do sul. O disco laranja central representa o sol. Adotada na independência da França em 1959." },
  { iso:"NG", name:"Nigéria",            continent:"africa", flag:"🇳🇬", type:"país",       desc:"A bandeira da Nigéria tem duas faixas verticais verdes com uma faixa branca central. O verde representa as florestas e a riqueza agrícola do país, enquanto o branco simboliza a unidade e a paz entre os mais de 500 grupos étnicos nigerianos. É uma das bandeiras mais simples da África. Adotada na independência do Reino Unido em 1960, foi escolhida por meio de concurso nacional." },
  { iso:"RW", name:"Ruanda",             continent:"africa", flag:"🇷🇼", type:"país",       desc:"A bandeira de Ruanda tem três faixas horizontais azul (maior), amarelo e verde, com um sol de 24 raios dourados no canto superior direito. O azul representa a felicidade e a paz; o amarelo, o desenvolvimento econômico; e o verde, a prosperidade e os recursos naturais. O sol simboliza a iluminação e o novo recomeço do país após o genocídio de 1994. Adotada em 2001 como símbolo de reconciliação e progresso." },
  { iso:"ST", name:"S. Tomé e Príncipe", continent:"africa", flag:"🇸🇹", type:"país",       desc:"A bandeira de São Tomé e Príncipe tem três faixas horizontais verde, amarelo e verde com uma faixa vertical vermelha à esquerda e duas estrelas negras de cinco pontas no campo amarelo. O verde representa as florestas tropicais; o amarelo, as plantações de cacau e café; e o vermelho, a luta pela independência. As duas estrelas representam as duas ilhas principais — São Tomé e Príncipe. Adotada na independência de Portugal em 1975." },
  { iso:"SN", name:"Senegal",            continent:"africa", flag:"🇸🇳", type:"país",       desc:"A bandeira do Senegal é um tricolor vertical verde, amarelo e vermelho com uma estrela verde de cinco pontas no centro do campo amarelo. As cores pan-africanas representam esperança (verde), riqueza e trabalho (amarelo) e vida e sacrifício (vermelho). A estrela verde evoca a fé islâmica, a unidade e a perfeição. Adotada na independência da França em 1960, a estrela diferencia a bandeira da Guiné, que é idêntica sem ela." },
  { iso:"SL", name:"Serra Leoa",         continent:"africa", flag:"🇸🇱", type:"país",       desc:"A bandeira de Serra Leoa tem três faixas horizontais verde, branco e azul. O verde representa as montanhas, as florestas e a riqueza agrícola; o branco, a unidade e a justiça; e o azul, o oceano Atlântico e o porto natural de Freetown, um dos melhores portos naturais da África. Adotada na independência do Reino Unido em 1961." },
  { iso:"SO", name:"Somália",            continent:"africa", flag:"🇸🇴", type:"país",       desc:"A bandeira da Somália tem fundo azul-celeste com uma estrela branca de cinco pontas no centro. O azul-celeste foi inspirado na cor da bandeira das Nações Unidas, que administrou o território durante a independência. A estrela branca simboliza a unidade dos cinco territórios historicamente habitados por somalis: Somália italiana, britânica, francesa (Djibuti), Etiópia e Quênia. Adotada na independência em 1960." },
  { iso:"ZA", name:"África do Sul",      continent:"africa", flag:"🇿🇦", type:"país",       desc:"A bandeira da África do Sul tem um Y horizontal verde (bordeado de ouro e branco) que parte da lateral esquerda para o centro, com triângulo preto à esquerda e faixas vermelha e azul nas bordas. As seis cores representam os diferentes grupos da 'nação arco-íris'. É considerada uma das mais coloridas e complexas bandeiras do mundo. Adotada em 1994 para simbolizar o fim do apartheid e a nova era democrática." },
  { iso:"SS", name:"Sudão do Sul",       continent:"africa", flag:"🇸🇸", type:"país",       desc:"A bandeira do Sudão do Sul tem três faixas horizontais — preta, vermelha e verde — com faixas finas brancas entre elas, um triângulo azul à esquerda e uma estrela amarela de cinco pontas. O preto representa o povo; o vermelho, o sangue derramado; o verde, a riqueza da terra; o azul, o Nilo; e o amarelo, a unidade nacional. Adotada na independência do Sudão em 2011, é a mais jovem bandeira do mundo." },
  { iso:"SD", name:"Sudão",              continent:"africa", flag:"🇸🇩", type:"país",       desc:"A bandeira do Sudão tem três faixas horizontais — vermelha, branca e preta — com um triângulo verde à esquerda. As cores pan-árabes representam o sangue (vermelho), a paz (branco) e as conquistas islâmicas do passado (preto). O triângulo verde simboliza o Islã e a prosperidade do país. Adotada em 1969, após o golpe de Estado que derrubou o governo civil." },
  { iso:"TZ", name:"Tanzânia",           continent:"africa", flag:"🇹🇿", type:"país",       desc:"A bandeira da Tanzânia tem uma diagonal preta bordeada de amarelo, dividindo verde (canto superior esquerdo) de azul (canto inferior direito). O verde representa a terra fértil e as riquezas naturais; o preto, o povo; o amarelo, os minerais; e o azul, o oceano Índico e os grandes lagos. A bandeira resulta da fusão das bandeiras de Tanganyika e Zanzibar, após a unificação dos dois países em 1964." },
  { iso:"TG", name:"Togo",               continent:"africa", flag:"🇹🇬", type:"país",       desc:"A bandeira do Togo tem cinco faixas horizontais alternadas verde e amarelo com um quadrado vermelho no canto superior esquerdo contendo uma estrela branca de cinco pontas. O verde representa a esperança e a agricultura; o amarelo, os recursos minerais e o trabalho; e o vermelho, a fidelidade e o amor ao país. A estrela branca representa pureza e vida nacional. Adotada na independência da França em 1960." },
  { iso:"TN", name:"Tunísia",            continent:"africa", flag:"🇹🇳", type:"país",       desc:"A bandeira da Tunísia tem fundo vermelho com um disco branco central contendo um crescente e uma estrela vermelhos. O vermelho é a cor histórica do Império Otomano, do qual a Tunísia fez parte por séculos. O crescente e a estrela são símbolos do Islã. O círculo branco representa o sol. Esta bandeira tem sido usada quase sem alterações desde o século XIX, tornando-a uma das mais antigas da África." },
  { iso:"UG", name:"Uganda",             continent:"africa", flag:"🇺🇬", type:"país",       desc:"A bandeira de Uganda tem seis faixas horizontais alternadas preta, amarela e vermelha, com um escudo circular branco no centro exibindo o Grou Coroado (Balearica regulorum). O preto representa o povo africano; o amarelo, o sol africano; e o vermelho, a fraternidade e o sangue. O Grou Coroado é o símbolo nacional de Uganda, escolhido pelo Rei Daudi Chwa II. Adotada na independência do Reino Unido em 1962." },
  { iso:"ZM", name:"Zâmbia",             continent:"africa", flag:"🇿🇲", type:"país",       desc:"A bandeira da Zâmbia tem fundo verde com uma faixa vertical tricolor (vermelho, preto e laranja) no canto inferior direito e uma águia do Zambeze laranja voando acima. O verde representa a natureza e os recursos naturais; o vermelho, o sangue pela liberdade; o preto, o povo zambiano; e o laranja, o cobre (principal recurso mineral). A águia simboliza a liberdade e a capacidade do país de elevar-se. Adotada na independência do Reino Unido em 1964." },
  { iso:"ZW", name:"Zimbábue",           continent:"africa", flag:"🇿🇼", type:"país",       desc:"A bandeira do Zimbábue tem sete faixas horizontais — verde, amarelo, vermelho, preto, vermelho, amarelo e verde — com triângulo branco à esquerda contendo estrela vermelha e o Pássaro do Zimbábue dourado. O verde representa a agricultura; o amarelo, os minerais; o vermelho, o sangue pela independência; e o preto, o povo africano. O Pássaro do Zimbábue é o símbolo nacional, encontrado nas ruínas de Grande Zimbábue. Adotada em 1980." },
  { iso:"RE", name:"Reunião",            continent:"africa", flag:"🇷🇪", type:"território", desc:"A Reunião usa a bandeira da França — tricolor vertical azul, branco e vermelho. É um departamento e região ultramarino francês situado no oceano Índico, a leste de Madagascar. O azul representa a liberdade; o branco, a igualdade; e o vermelho, a fraternidade — os ideais da Revolução Francesa. A ilha tem um pavilhão não oficial com um vulcão em erupção, mas sem reconhecimento legal." },
  { iso:"YT", name:"Mayotte",            continent:"africa", flag:"🇾🇹", type:"território", desc:"Mayotte usa a bandeira da França — tricolor vertical azul, branco e vermelho. É um departamento e região ultramarino francês localizado no canal de Moçambique, entre Madagáscar e o continente africano. O azul representa a liberdade; o branco, a igualdade; e o vermelho, a fraternidade. Tornou-se o 101º departamento francês em 2011, após referendo que rejeitou a independência junto com as Comores." },
  { iso:"EH", name:"Saara Ocidental",    continent:"africa", flag:"🇪🇭", type:"território", desc:"A bandeira do Saara Ocidental tem três faixas verticais — preta, branca e verde — com triângulo vermelho à esquerda e um crescente com estrela brancos no centro. As cores pan-árabes e o crescente islâmico refletem a identidade árabe do povo saraui. O território é disputado entre o Marrocos, que o controla, e a Frente Polisário, que proclamou a República Árabe Saraui Democrática. A bandeira foi adotada em 1976." },

  // ── ÁSIA ──
  { iso:"AF", name:"Afeganistão",        continent:"asia", flag:"🇦🇫", type:"país",       desc:"A bandeira do Afeganistão tem três faixas verticais — preta, vermelha e verde — com o emblema nacional no centro. O preto representa os tempos sombrios do passado colonial; o vermelho, o sangue pelos compatriotas; e o verde, o Islã e a esperança. O emblema central mostra uma mesquita com a Chahada e diversas inscrições islâmicas. A bandeira foi redesenhada com o retorno dos talibãs em 2021 e é objeto de disputa entre grupos políticos afegãos." },
  { iso:"AM", name:"Armênia",            continent:"asia", flag:"🇦🇲", type:"país",       desc:"A bandeira da Armênia tem três faixas horizontais — vermelha, azul e laranja. O vermelho representa o sangue armênio derramado ao longo da história, especialmente no genocídio de 1915; o azul, o céu da pátria armênia e as esperanças do povo; e o laranja, a criatividade, a coragem e a riqueza natural. Adotada em 1990, com a dissolução da URSS, restaurando a bandeira da primeira república armênia de 1918." },
  { iso:"AZ", name:"Azerbaijão",         continent:"asia", flag:"🇦🇿", type:"país",       desc:"A bandeira do Azerbaijão tem três faixas horizontais — azul, vermelha e verde — com um crescente e uma estrela de oito pontas brancos no centro. O azul representa a pertença turca; o vermelho, o progresso e a modernidade; e o verde, o Islã. O crescente e a estrela são símbolos islâmicos; as oito pontas da estrela representam as oito letras da palavra 'Azerbaijão' no antigo alfabeto árabe. Adotada em 1991." },
  { iso:"BH", name:"Bahrein",            continent:"asia", flag:"🇧🇭", type:"país",       desc:"A bandeira do Bahrein tem metade esquerda branca e metade direita vermelha, separadas por uma linha serrilhada de cinco pontas. O branco representa a paz e a pureza; o vermelho, a cor histórica dos estados do Golfo Pérsico. As cinco pontas da linha serrilhada representam os cinco pilares do Islã. Adotada na versão atual em 2002, quando o país passou de emirado a reino." },
  { iso:"BD", name:"Bangladesh",         continent:"asia", flag:"🇧🇩", type:"país",       desc:"A bandeira de Bangladesh tem fundo verde com um disco vermelho deslocado ligeiramente para a esquerda do centro. O verde representa a exuberância natural do país e o Islã; o disco vermelho simboliza o sol nascente e o sangue derramado na Guerra de Libertação de 1971. Adotada em 1972, o disco foi deslocado para parecer centralizado quando a bandeira estiver hasteada e ao vento." },
  { iso:"BT", name:"Butão",              continent:"asia", flag:"🇧🇹", type:"país",       desc:"A bandeira do Butão é dividida diagonalmente em laranja (superior) e vermelho-escuro (inferior), com um dragão branco (Druk) cruzando o centro. O laranja representa as práticas espirituais budistas; o vermelho-escuro, os mosteiros e o poder sagrado. O dragão Druk — que dá nome ao país ('Terra do Dragão do Trovão') — segura joias que representam a riqueza da nação. Adotada na forma atual em 1969." },
  { iso:"BN", name:"Brunei",             continent:"asia", flag:"🇧🇳", type:"país",       desc:"A bandeira de Brunei tem fundo amarelo com duas faixas diagonais — branca e preta — e o brasão nacional no centro. O amarelo representa o Sultão e a soberania real; o branco e o preto representam dois altos ministros do governo (Pengiran Bendahara e Pengiran Pemancha). O brasão inclui cúpulas, guarda-chuva real e mãos em oração. Brunei é uma monarquia islâmica absoluta. Adotada em 1959." },
  { iso:"KH", name:"Camboja",            continent:"asia", flag:"🇰🇭", type:"país",       desc:"A bandeira do Camboja tem três faixas horizontais — azul, vermelha (mais larga) e azul — com o templo de Angkor Wat branco no centro. É uma das poucas bandeiras do mundo com um edifício como símbolo central. O azul representa a realeza; o vermelho, a nação; e o branco, a religião budista e a pureza. Angkor Wat é o maior complexo religioso do mundo. Adotada em 1993, restaurando a versão histórica." },
  { iso:"CN", name:"China",              continent:"asia", flag:"🇨🇳", type:"país",       desc:"A bandeira da China tem fundo vermelho com uma grande estrela amarela e quatro estrelas menores no canto superior esquerdo. O vermelho representa a revolução comunista e o sangue dos mártires; o amarelo, a raça e o futuro radiante. A grande estrela simboliza o Partido Comunista Chinês; as quatro estrelas menores representam as quatro classes sociais — operários, camponeses, burguesia urbana e burguesia nacional — unidas sob sua liderança. Adotada em 1949." },
  { iso:"CY", name:"Chipre",             continent:"asia", flag:"🇨🇾", type:"país",       desc:"A bandeira de Chipre tem fundo branco com o mapa do país em cobre dourado e dois ramos de oliveira verdes cruzados abaixo. O cobre dourado representa as vastas reservas do metal que deram nome à ilha em latim (Kypros → cuprum → cobre). Os ramos de oliveira simbolizam a paz entre as comunidades grega e turca. É uma das poucas bandeiras com o mapa do próprio país representado. Adotada em 1960." },
  { iso:"GE", name:"Geórgia",            continent:"asia", flag:"🇬🇪", type:"país",       desc:"A bandeira da Geórgia tem fundo branco com uma cruz vermelha grande (Cruz de São Jorge) dividindo o campo em quatro quadrantes, cada um com uma cruz vermelha menor. A Cruz de São Jorge é o símbolo histórico da Geórgia medieval. As quatro cruzes menores, chamadas 'bolnisi kvari', são um motivo cristão georgiano milenar. Chamada a 'Bandeira das Cinco Cruzes', foi restaurada em 2004 após a Revolução das Rosas." },
  { iso:"IN", name:"Índia",              continent:"asia", flag:"🇮🇳", type:"país",       desc:"A bandeira da Índia tem três faixas horizontais — açafrão, branco e verde — com a Roda de Ashoka (Chakra) azul de 24 raios no centro. O açafrão representa a coragem e o sacrifício; o branco, a verdade e a paz; e o verde, a fé e a fertilidade. A Roda de Ashoka representa o dharma (lei eterna) e o movimento contínuo do progresso. Adotada na independência do Reino Unido em 1947." },
  { iso:"ID", name:"Indonésia",          continent:"asia", flag:"🇮🇩", type:"país",       desc:"A bandeira da Indonésia tem duas faixas horizontais iguais — vermelha (superior) e branca (inferior). O vermelho representa a coragem e o branco, a pureza espiritual. É quase idêntica à bandeira de Mônaco, diferindo apenas nas proporções. As cores foram usadas pelo Majapahit, poderoso império medieval indonésio do século XIII. Adotada na proclamação da independência em 17 de agosto de 1945." },
  { iso:"IR", name:"Irã",               continent:"asia", flag:"🇮🇷", type:"país",       desc:"A bandeira do Irã tem três faixas horizontais — verde, branca e vermelha — com o emblema nacional vermelho no centro (estilização da palavra 'Allah') e a Chahada inscrita 22 vezes nas bordas das faixas, em branco. O verde representa o Islã e o crescimento; o branco, a paz; e o vermelho, o sangue dos mártires. O número 22 representa o 22 de Bahman do calendário persa (11 de fevereiro de 1979), dia da Revolução Islâmica." },
  { iso:"IQ", name:"Iraque",             continent:"asia", flag:"🇮🇶", type:"país",       desc:"A bandeira do Iraque tem três faixas horizontais — vermelha, branca e preta — com a frase 'Allahu Akbar' em árabe cúfico verde no centro. As cores pan-árabes representam o sangue (vermelho), a paz (branco) e as conquistas do povo árabe (preto). A inscrição, que significa 'Deus é Grande', foi adicionada por Saddam Hussein em 1991; a fonte foi modificada pelo governo pós-invasão em 2008." },
  { iso:"IL", name:"Israel",             continent:"asia", flag:"🇮🇱", type:"país",       desc:"A bandeira de Israel tem fundo branco com duas faixas horizontais azuis e a Estrela de Davi (Magen David) azul no centro. O azul e o branco são as cores do talit, o manto de oração judaico. A Estrela de Davi é o símbolo histórico do judaísmo e do povo judeu há séculos. A bandeira foi adotada em 1948, com a fundação do Estado de Israel, após a decisão das Nações Unidas de partilha da Palestina." },
  { iso:"JP", name:"Japão",              continent:"asia", flag:"🇯🇵", type:"país",       desc:"A bandeira do Japão tem fundo branco com um disco vermelho no centro. O disco vermelho representa o sol nascente, refletindo o nome 'Nihon' (origem do sol). O branco simboliza a honestidade e a pureza. Conhecida como 'Hinomaru' (círculo do sol), a bandeira tem uso histórico documentado desde o século XIII. É uma das bandeiras nacionais mais antigas e icônicas do mundo." },
  { iso:"JO", name:"Jordânia",           continent:"asia", flag:"🇯🇴", type:"país",       desc:"A bandeira da Jordânia tem três faixas horizontais — preta, branca e verde — com triângulo vermelho à esquerda contendo uma estrela branca de sete pontas. As cores pan-árabes representam os califados abássida (preto), omíada (branco) e fatímida (verde). A estrela de sete pontas representa os sete versículos da Fatiha (abertura do Alcorão) e as sete províncias do país. Adotada em 1928." },
  { iso:"KZ", name:"Cazaquistão",        continent:"asia", flag:"🇰🇿", type:"país",       desc:"A bandeira do Cazaquistão tem fundo azul-celeste com um sol dourado de 32 raios, uma águia estepária dourada voando abaixo dele, e um ornamento tradicional vertical (khanjar) à esquerda. O azul-celeste representa o céu eterno (Tengri), sagrado para os cazaques; o sol e a águia simbolizam a liberdade e o futuro radiante. O ornamento vertical é um padrão decorativo tradicional. Adotada na independência da URSS em 1992." },
  { iso:"KW", name:"Kuwait",             continent:"asia", flag:"🇰🇼", type:"país",       desc:"A bandeira do Kuwait tem três faixas horizontais — verde, branca e vermelha — com um trapézio preto no canto esquerdo. As cores pan-árabes representam as terras férteis (verde), a pureza das ações (branco) e o sangue nos campos de batalha (vermelho). O preto representa a derrota dos inimigos. Adotada na independência do Reino Unido em 1961." },
  { iso:"KG", name:"Quirguistão",        continent:"asia", flag:"🇰🇬", type:"país",       desc:"A bandeira do Quirguistão tem fundo vermelho com um sol amarelo de 40 raios e um padrão circular dourado no centro (tunduk — a abertura superior da yurta quirguiz). O vermelho é a cor histórica da bandeira do herói épico Manas. Os 40 raios representam as 40 tribos unidas pelo herói Manas no século XVIII. O tunduk simboliza o lar tradicional do povo e sua ligação com o cosmos. Adotada em 1992." },
  { iso:"LA", name:"Laos",               continent:"asia", flag:"🇱🇦", type:"país",       desc:"A bandeira do Laos tem três faixas horizontais — vermelha, azul (mais larga) e vermelha — com um disco branco no centro. O azul representa a prosperidade e o rio Mekong, vital para o país; o vermelho, o sangue de quem lutou pela nação; e o disco branco, a lua cheia refletida no Mekong e a unidade nacional. É uma das poucas bandeiras comunistas que não usa estrela vermelha. Adotada em 1975." },
  { iso:"LB", name:"Líbano",             continent:"asia", flag:"🇱🇧", type:"país",       desc:"A bandeira do Líbano tem duas faixas horizontais vermelhas com uma faixa branca no centro contendo um cedro verde. O vermelho representa o sangue dos mártires; o branco, a paz e a pureza; e o cedro do Líbano, a imortalidade, a resiliência e a história milenar do povo. Os cedros do Líbano são mencionados na Bíblia e foram usados na construção do Templo de Salomão. Adotada em 1943." },
  { iso:"MY", name:"Malásia",            continent:"asia", flag:"🇲🇾", type:"país",       desc:"A bandeira da Malásia tem 14 faixas horizontais alternadas vermelhas e brancas com um canton azul no canto superior esquerdo contendo crescente e estrela dourados de 14 pontas. As 14 faixas e as 14 pontas da estrela (Bintang Persekutuan) representam os 13 estados e o território federal de Kuala Lumpur. O crescente representa o Islã e a estrela, a unidade federal. Adotada na forma atual em 1963." },
  { iso:"MV", name:"Maldivas",           continent:"asia", flag:"🇲🇻", type:"país",       desc:"A bandeira das Maldivas tem fundo verde com uma borda vermelha e um crescente branco no centro. O verde representa a prosperidade e a vegetação das ilhas; o vermelho, o sangue dos heróis que defenderam o país; e o crescente branco, o Islã, religião oficial e central na identidade maldívia. Adotada em 1965, com a independência do Reino Unido." },
  { iso:"MN", name:"Mongólia",           continent:"asia", flag:"🇲🇳", type:"país",       desc:"A bandeira da Mongólia tem três faixas verticais — vermelha, azul e vermelha — com o símbolo Soyombo dourado na faixa esquerda. O azul representa o céu eterno (Tengri), sagrado para os mongóis, e o vermelho, a prosperidade e o progresso. O Soyombo é um símbolo nacional complexo contendo chamas, sol, lua, triângulos e figuras geométricas, representando liberdade e independência. Adotada em 1992." },
  { iso:"MM", name:"Mianmar",            continent:"asia", flag:"🇲🇲", type:"país",       desc:"A bandeira de Mianmar tem três faixas horizontais — amarela, verde e vermelha — com uma estrela branca de cinco pontas no centro. O amarelo representa a solidariedade; o verde, a paz e a tranquilidade; e o vermelho, a coragem e determinação. A estrela branca de cinco pontas simboliza a união dos povos e etnias do país. Adotada em 2010, com a mudança do governo militar para uma nova constituição." },
  { iso:"NP", name:"Nepal",              continent:"asia", flag:"🇳🇵", type:"país",       desc:"A bandeira do Nepal é a única bandeira nacional com forma não retangular — dois triângulos empilhados formam uma pênon dupla. O campo escarlate com bordas azuis contém a lua branca no triângulo inferior e o sol branco no superior. É a única bandeira nacional de forma irregular existente. O vermelho é a cor da flor rododendro, flor nacional; o azul representa a paz. Adotada em 1962." },
  { iso:"KP", name:"Coreia do Norte",    continent:"asia", flag:"🇰🇵", type:"país",       desc:"A bandeira da Coreia do Norte tem três faixas horizontais — azul, vermelha (mais larga) e azul — com faixas finas brancas entre elas e um círculo vermelho com estrela vermelha de cinco pontas à esquerda. O azul representa a paz, a soberania e a amizade; o vermelho, o espírito revolucionário. A estrela vermelha simboliza o comunismo e o Partido dos Trabalhadores da Coreia. Adotada em 1948." },
  { iso:"OM", name:"Omã",               continent:"asia", flag:"🇴🇲", type:"país",       desc:"A bandeira de Omã tem três faixas horizontais — branca, vermelha e verde — com uma faixa vertical vermelha à esquerda e o emblema nacional (dois khanjars — facas curvas cruzadas — com uma correia) no canto superior esquerdo. O vermelho é a cor histórica do Sultanato de Omã; o branco representa o imame e a paz; e o verde, a fertilidade e as montanhas. Adotada na forma atual em 1995." },
  { iso:"PK", name:"Paquistão",          continent:"asia", flag:"🇵🇰", type:"país",       desc:"A bandeira do Paquistão tem fundo verde com uma faixa vertical branca à esquerda e crescente e estrela brancos no centro. O verde representa a maioria muçulmana e o Islã; a faixa branca, as minorias religiosas não-muçulmanas. O crescente e a estrela são símbolos islâmicos clássicos. Adotada na independência da Índia Britânica em 1947, quando Paquistão surgiu como estado islâmico." },
  { iso:"PS", name:"Palestina",          continent:"asia", flag:"🇵🇸", type:"território", desc:"A bandeira da Palestina tem três faixas horizontais — preta, branca e verde — com triângulo vermelho à esquerda. As cores pan-árabes representam os califados abássida (preto), omíada (branco) e fatímida (verde); o triângulo vermelho representa o califado hachemita. É a bandeira da Autoridade Nacional Palestina, reconhecida pela ONU como Estado observador não-membro desde 2012. Adotada em 1964." },
  { iso:"PH", name:"Filipinas",          continent:"asia", flag:"🇵🇭", type:"país",       desc:"A bandeira das Filipinas tem duas faixas horizontais — azul (superior) e vermelha — com triângulo branco à esquerda contendo sol de oito raios e três estrelas. O azul representa a paz; o vermelho, o patriotismo. O sol representa as oito primeiras províncias que se rebelaram contra a Espanha; as três estrelas, os três grupos de ilhas. Única bandeira com significado diferente em guerra: quando inverte (vermelho em cima), o país está em conflito." },
  { iso:"QA", name:"Catar",              continent:"asia", flag:"🇶🇦", type:"país",       desc:"A bandeira do Catar tem campo branco à esquerda e campo bordô (carmesim escuro) à direita, separados por uma borda serrilhada de nove pontas. O branco representa a paz; o bordô é a cor que os têxteis catarenses ficavam com a exposição solar intensa. As nove pontas representam o Catar como o nono membro do Conselho de Cooperação do Golfo. Adotada em 1971." },
  { iso:"SA", name:"Arábia Saudita",     continent:"asia", flag:"🇸🇦", type:"país",       desc:"A bandeira da Arábia Saudita tem fundo verde com a Chahada ('Não há outro Deus senão Allah, e Maomé é seu profeta') em árabe branco e uma espada branca abaixo. O verde é a cor sagrada do Islã. A Chahada é o primeiro e mais fundamental pilar da fé islâmica. A espada representa a firmeza e justiça. É uma das poucas bandeiras que nunca pode ser hasteada de cabeça para baixo, por respeito ao texto sagrado." },
  { iso:"SG", name:"Singapura",          continent:"asia", flag:"🇸🇬", type:"país",       desc:"A bandeira de Singapura tem metade superior vermelha e metade inferior branca, com crescente e cinco estrelas brancas de cinco pontas no canto superior esquerdo. O vermelho representa a igualdade universal e a fraternidade; o branco, a pureza. O crescente representa o jovem país em ascensão e o Islã como religião presente; as cinco estrelas simbolizam os ideais de democracia, paz, progresso, justiça e igualdade. Adotada em 1959." },
  { iso:"KR", name:"Coreia do Sul",      continent:"asia", flag:"🇰🇷", type:"país",       desc:"A bandeira da Coreia do Sul tem fundo branco com o símbolo Taeguek (yin-yang) em azul e vermelho no centro e quatro trigramas pretos nos cantos. O branco representa a paz e a pureza. O Taeguek simboliza o equilíbrio cósmico entre forças opostas (céu e terra, água e fogo). Os quatro trigramas do I Ching representam o céu, a água, a terra e o fogo. Adotada em 1948 com a fundação da república." },
  { iso:"LK", name:"Sri Lanka",          continent:"asia", flag:"🇱🇰", type:"país",       desc:"A bandeira do Sri Lanka tem fundo dourado com um leão dourado segurando uma espada em campo vermelho-escuro, folhas de figueira nos cantos e faixas verticais verde e laranja à esquerda. O leão representa a força e a coragem singalesa; o vermelho, o sangue do povo. As faixas verde e laranja representam as comunidades muçulmana e tâmil, respectivamente. Adotada na independência do Reino Unido em 1948." },
  { iso:"SY", name:"Síria",              continent:"asia", flag:"🇸🇾", type:"país",       desc:"A bandeira da Síria tem três faixas horizontais — vermelha, branca e preta — com duas estrelas verdes de cinco pontas no campo branco. As cores pan-árabes refletem os movimentos de unificação árabe. As duas estrelas representam a Síria e o Egito, durante a República Árabe Unida (1958–1961). A bandeira foi restaurada em 1980. Com a guerra civil síria, grupos opositores usam a bandeira histórica da independência." },
  { iso:"TW", name:"Taiwan",             continent:"asia", flag:"🇹🇼", type:"território", desc:"A bandeira de Taiwan tem fundo vermelho com um retângulo azul no canto superior esquerdo contendo um sol branco de 12 raios. O azul e o branco representam liberdade e pureza; o vermelho, fraternidade e sacrifício. O sol de 12 raios representa as 12 horas do dia e os princípios do Kuomintang (Partido Nacionalista). Adotada em 1928 pela República da China. Taiwan não é reconhecida como Estado pela ONU." },
  { iso:"TJ", name:"Tadjiquistão",       continent:"asia", flag:"🇹🇯", type:"país",       desc:"A bandeira do Tadjiquistão tem três faixas horizontais — vermelha, branca e verde — com uma coroa dourada e sete estrelas brancas no centro do campo branco. O vermelho representa a unidade e a vitória; o branco, a pureza, a neve das montanhas e o algodão; e o verde, as florestas e os vales férteis. A coroa e as estrelas simbolizam a soberania e as sete regiões do país. Adotada em 1992." },
  { iso:"TH", name:"Tailândia",          continent:"asia", flag:"🇹🇭", type:"país",       desc:"A bandeira da Tailândia tem cinco faixas horizontais — vermelha, branca, azul (mais larga), branca e vermelha. O vermelho representa a nação e o povo; o branco, as religiões praticadas no país; e o azul, a monarquia real. Chamada 'Trairong' (tricolor), a faixa azul substituiu em 1917 um elefante branco que havia na versão anterior, tornando a bandeira mais identificável ao contrário. Adotada em 1917." },
  { iso:"TL", name:"Timor-Leste",        continent:"asia", flag:"🇹🇱", type:"país",       desc:"A bandeira de Timor-Leste tem fundo vermelho com triângulo amarelo sobreposto por triângulo preto menor à esquerda, com uma estrela branca de cinco pontas no triângulo preto. O vermelho representa a luta pela libertação nacional; o amarelo, os vestígios da história colonial; o preto, a obscuridade que deve ser superada; e a estrela branca, a luz que guia o caminho. Adotada na independência em 2002, após ocupação indonésia." },
  { iso:"TR", name:"Turquia",            continent:"asia", flag:"🇹🇷", type:"país",       desc:"A bandeira da Turquia tem fundo vermelho com crescente e estrela brancos. O vermelho é a cor histórica dos sultanatos turcos do Império Otomano. O crescente e a estrela são símbolos islâmicos clássicos; segundo a lenda turca, representam a luz refletida em sangue derramado após uma batalha. Adotada pela República Turca em 1923, com a fundação do estado laico moderno por Mustafá Kemal Atatürk." },
  { iso:"TM", name:"Turcomenistão",      continent:"asia", flag:"🇹🇲", type:"país",       desc:"A bandeira do Turcomenistão tem fundo verde com uma faixa vertical vermelha à esquerda contendo cinco ornamentos tradicionais de tapete (gols) e crescente com cinco estrelas brancos. O verde representa o Islã e a esperança; o crescente, a fé islâmica; e as cinco estrelas, as cinco províncias do país. Os cinco gols representam as cinco tribos turcomanas principais. É a bandeira nacional mais complexa do mundo. Adotada em 1992." },
  { iso:"AE", name:"Emirados Árabes",    continent:"asia", flag:"🇦🇪", type:"país",       desc:"A bandeira dos Emirados Árabes tem uma faixa vertical vermelha à esquerda e três faixas horizontais — verde, branca e preta — à direita. As cores pan-árabes representam os emirados árabes históricos (verde), a paz (branco), as riquezas passadas (preto) e o sangue dos inimigos nas batalhas (vermelho). Adotada na criação da federação dos sete emirados em 1971." },
  { iso:"UZ", name:"Uzbequistão",        continent:"asia", flag:"🇺🇿", type:"país",       desc:"A bandeira do Uzbequistão tem três faixas horizontais — azul, branca e verde — com finas linhas vermelhas separando-as, e crescente branco com doze estrelas no canto superior esquerdo. O azul representa o céu e a água; o branco, a paz e a pureza; e o verde, a natureza e a fertilidade. O crescente representa o calendário islâmico e as doze estrelas, os meses do ano. Adotada em 1991." },
  { iso:"VN", name:"Vietnã",             continent:"asia", flag:"🇻🇳", type:"país",       desc:"A bandeira do Vietnã tem fundo vermelho com uma estrela amarela de cinco pontas no centro. O vermelho representa a revolução e o sangue derramado na luta pela independência; a estrela dourada simboliza as cinco classes sociais unidas: trabalhadores, camponeses, soldados, intelectuais e jovens. Adotada em 1955 para o Vietnã do Norte e estendida a todo o país em 1976, após a reunificação pós-guerra." },
  { iso:"YE", name:"Iêmen",              continent:"asia", flag:"🇾🇪", type:"país",       desc:"A bandeira do Iêmen tem três faixas horizontais — vermelha, branca e preta. As cores pan-árabes refletem a história árabe e islâmica do país. O vermelho representa o sangue dos mártires; o branco, o futuro brilhante; e o preto, os períodos sombrios superados. O Iêmen do Norte e o Sul tinham emblemas em suas respectivas bandeiras que foram removidos na reunificação em 1990." },
  { iso:"HK", name:"Hong Kong",          continent:"asia", flag:"🇭🇰", type:"território", desc:"A bandeira de Hong Kong tem fundo vermelho com uma flor de bauhinia branca de cinco pétalas estilizadas, cada uma com uma linha vermelha. O vermelho é a cor da China continental, à qual Hong Kong pertence desde 1997. A bauhinia purpúrea (orquídea-da-árvore) é a flor emblemática de Hong Kong. As linhas vermelhas nas pétalas representam a ligação entre o território e a China. Pavilhão regional desde a transferência da soberania britânica em 1997." },
  { iso:"MO", name:"Macau",              continent:"asia", flag:"🇲🇴", type:"território", desc:"A bandeira de Macau tem fundo verde com uma flor de lótus branca de três camadas, ponte e mar em verde claro, e cinco estrelas douradas acima. O verde representa a paz e a prosperidade; a flor de lótus é símbolo de Macau desde os tempos coloniais portugueses. As cinco estrelas, como na bandeira da China, representam a unidade com o continente. Pavilhão regional desde a transferência da soberania portuguesa em 1999." },

  // ── EUROPA ──
  { iso:"AL", name:"Albânia",             continent:"europe", flag:"🇦🇱", type:"país",       desc:"A bandeira da Albânia tem fundo vermelho com uma águia negra de duas cabeças no centro. A águia bicéfala é o símbolo histórico do antigo estado albanês medieval, associado ao herói nacional Gjergj Kastrioti (Skanderbeg), que resistiu ao Império Otomano no século XV. O vermelho representa a coragem e o sangue dos heróis pela liberdade. Adotada com a independência do Império Otomano em 1912." },
  { iso:"AD", name:"Andorra",             continent:"europe", flag:"🇦🇩", type:"país",       desc:"A bandeira de Andorra é um tricolor vertical azul, amarelo e vermelho com o brasão nacional no centro. O azul e o vermelho são as cores da França; o amarelo e o vermelho, da Catalunha (Espanha). O brasão mostra os quatro quarteirões dos co-príncipes históricos. Andorra é cogobernada pelo Presidente da França e pelo Bispo de Urgell — a única coprinciparia do mundo. Adotada em 1866." },
  { iso:"AT", name:"Áustria",             continent:"europe", flag:"🇦🇹", type:"país",       desc:"A bandeira da Áustria tem três faixas horizontais iguais — vermelha, branca e vermelha. É uma das bandeiras nacionais mais antigas ainda em uso: a lenda conta que foi criada pelo Duque Leopoldo V após a Batalha de Ptolemais em 1191, quando seu manto ficou manchado de sangue exceto onde estava coberto pelo cinto. As cores foram usadas pela Casa de Habsburgo por séculos. Adotada oficialmente em 1918." },
  { iso:"BY", name:"Bielorrússia",        continent:"europe", flag:"🇧🇾", type:"país",       desc:"A bandeira da Bielorrússia tem fundo vermelho com uma faixa verde no terço inferior e um ornamento tradicional branco e vermelho à esquerda. O ornamento é baseado em bordados populares bielorrussos (ruchnik). O vermelho representa o passado e os sacrifícios; o verde, o futuro e a natureza. É a única bandeira europeia com ornamento de bordado como elemento. Adotada após referendo em 1995, restaurando a versão soviética modificada." },
  { iso:"BE", name:"Bélgica",             continent:"europe", flag:"🇧🇪", type:"país",       desc:"A bandeira da Bélgica é um tricolor vertical preto, amarelo e vermelho. As cores foram adotadas da heráldica do Ducado de Brabante, cujo escudo mostrava um leão dourado em campo preto com garras e língua vermelha. Adotada após a Revolução Belga de 1830, que levou à independência dos Países Baixos. É uma das poucas bandeiras com proporção de 13:15, mais alta do que larga." },
  { iso:"BA", name:"Bósnia e Herzegovina", continent:"europe", flag:"🇧🇦", type:"país",      desc:"A bandeira da Bósnia e Herzegovina tem fundo azul com um triângulo amarelo e uma diagonal de estrelas brancas. O triângulo representa os três povos constituintes: bósnios, sérvios e croatas. O amarelo representa o sol e a esperança; o azul, o céu e a aspiração europeia. As estrelas foram inspiradas na bandeira da UE. Adotada em 1998 pelo Escritório do Alto Representante Internacional, após a guerra dos anos 1990." },
  { iso:"BG", name:"Bulgária",            continent:"europe", flag:"🇧🇬", type:"país",       desc:"A bandeira da Bulgária é um tricolor horizontal branco, verde e vermelho. O branco representa a paz e a pureza; o verde, a riqueza agrícola e as florestas; e o vermelho, a coragem e o sangue dos combatentes pela independência. Foi baseada na bandeira russa, substituindo o azul pelo verde. Adotada com a liberação do jugo otomano em 1878 e restaurada em 1990 após o fim do comunismo." },
  { iso:"HR", name:"Croácia",             continent:"europe", flag:"🇭🇷", type:"país",       desc:"A bandeira da Croácia é um tricolor horizontal vermelho, branco e azul com o brasão nacional no centro. O brasão tem o característico xadrez vermelho e branco (šahovnica), símbolo histórico da Croácia medieval, com cinco escudos menores das regiões históricas acima. O vermelho, branco e azul são as cores eslavas tradicionais. Adotada na independência da Iugoslávia em 1991." },
  { iso:"CZ", name:"Rep. Tcheca",         continent:"europe", flag:"🇨🇿", type:"país",       desc:"A bandeira da República Tcheca tem duas faixas horizontais — branca (superior) e vermelha (inferior) — com triângulo azul à esquerda. O branco e o vermelho são as cores históricas da Boêmia; o azul foi acrescentado para diferenciar da bandeira da Polônia. Criada em 1920 para a então Checoslováquia, a bandeira foi mantida pela República Tcheca após a separação pacífica da Eslováquia em 1993." },
  { iso:"DK", name:"Dinamarca",           continent:"europe", flag:"🇩🇪", type:"país",       desc:"A bandeira da Dinamarca, chamada Dannebrog, tem fundo vermelho com uma cruz branca nórdica deslocada para a esquerda. É considerada a mais antiga bandeira nacional ainda em uso contínuo, com uso documentado desde o século XIII. Segundo a lenda, caiu dos céus durante a Batalha de Lyndanisse em 1219. O design da cruz nórdica influenciou as bandeiras de todos os países nórdicos." },
  { iso:"EE", name:"Estônia",             continent:"europe", flag:"🇪🇪", type:"país",       desc:"A bandeira da Estônia tem três faixas horizontais — azul, preta e branca. O azul representa o céu, o mar e a esperança; o preto, a terra e o sofrimento histórico sob ocupações estrangeiras; e o branco, a neve, a luz e o futuro. Adotada em 1881 pelas associações estudantis e usada na primeira república (1918–1940). Restaurada em 1990, durante a restauração da independência da URSS." },
  { iso:"FI", name:"Finlândia",           continent:"europe", flag:"🇫🇮", type:"país",       desc:"A bandeira da Finlândia tem fundo branco com uma cruz azul nórdica deslocada para a esquerda. O azul representa os lagos e o céu finlandeses (o país tem mais de 180 mil lagos); o branco, a neve que cobre o território no inverno. Adotada em 1918, após a independência da Rússia. Segue o padrão das bandeiras nórdicas estabelecido pela Dinamarca no século XIII." },
  { iso:"FR", name:"França",              continent:"europe", flag:"🇫🇷", type:"país",       desc:"A bandeira da França é um tricolor vertical azul, branco e vermelho. Símbolo da Revolução Francesa de 1789, representa os ideais de Liberté, Égalité e Fraternité. As cores da Guarda Nacional Parisiense (azul e vermelho) foram combinadas com o branco real. Uma das bandeiras mais influentes da história, tendo inspirado diretamente dezenas de outras, incluindo a italiana, a mexicana e a irlandesa." },
  { iso:"DE", name:"Alemanha",            continent:"europe", flag:"🇩🇪", type:"país",       desc:"A bandeira da Alemanha é um tricolor horizontal preto, vermelho e dourado. Essas cores foram associadas às tropas voluntárias que combateram contra Napoleão — uniformes pretos com botões dourados e sangue vermelho. Representam os ideais de unidade e liberdade. Adotada em 1919 para a República de Weimar, brevemente suspensa, e restaurada em 1949 para a República Federal Alemã." },
  { iso:"GR", name:"Grécia",              continent:"europe", flag:"🇬🇷", type:"país",       desc:"A bandeira da Grécia tem nove faixas horizontais alternadas azuis e brancas com uma cruz branca em campo azul no canto superior esquerdo. As nove faixas representam as nove sílabas de 'Elefthería í Thánatos' ('Liberdade ou Morte'), o lema da revolução de 1821 contra o Império Otomano. O azul e branco são cores tradicionais gregas e a cruz representa o Cristianismo Ortodoxo. Adotada em 1978." },
  { iso:"HU", name:"Hungria",             continent:"europe", flag:"🇭🇺", type:"país",       desc:"A bandeira da Hungria é um tricolor horizontal vermelho, branco e verde. Essas cores têm uso documentado desde o período medieval húngaro; foram popularizadas durante a Revolução de 1848 contra o domínio dos Habsburgos. O vermelho representa a força; o branco, a fidelidade; e o verde, a esperança. Adotada oficialmente em 1957, após a Revolução Húngara de 1956." },
  { iso:"IS", name:"Islândia",            continent:"europe", flag:"🇮🇸", type:"país",       desc:"A bandeira da Islândia tem fundo azul com uma cruz vermelha bordeada de branco (cruz nórdica). O azul representa o oceano Atlântico e as montanhas; o branco, a neve e as geleiras; e o vermelho, o fogo dos vulcões ativos. Segue o padrão das bandeiras nórdicas, honrando os laços com a Dinamarca e a Noruega. Adotada em 1944, quando a Islândia se proclamou república independente." },
  { iso:"IE", name:"Irlanda",             continent:"europe", flag:"🇮🇪", type:"país",       desc:"A bandeira da Irlanda é um tricolor vertical verde, branco e laranja. O verde representa os católicos irlandeses e a tradição gaélica; o laranja, os protestantes (Orange Order) e os unionistas; e o branco, a paz desejada entre as duas comunidades. Inspirada na tricolor francesa, foi usada pela primeira vez em 1848 durante a Revolta Jovem Irlanda e tornou-se bandeira oficial em 1922." },
  { iso:"IT", name:"Itália",              continent:"europe", flag:"🇮🇹", type:"país",       desc:"A bandeira da Itália é um tricolor vertical verde, branco e vermelho. Inspirada na tricolor francesa, substituiu o azul pelo verde. As cores foram usadas pela primeira vez pela Legião Lombarda Italiana em 1796, durante as campanhas napoleônicas. O verde representa as planícies, o branco os Alpes nevados e o vermelho o sangue dos combatentes pela unidade. Adotada com a unificação da Itália em 1861." },
  { iso:"XK", name:"Kosovo",              continent:"europe", flag:"🇽🇰", type:"país",       desc:"A bandeira do Kosovo tem fundo azul com o mapa dourado do território e seis estrelas brancas em arco acima. As seis estrelas representam as seis principais comunidades étnicas: albaneses, sérvios, turcos, bósnios, roma e outros. O azul representa a aspiração à integração europeia. Adotada na declaração unilateral de independência da Sérvia em 2008, reconhecida por mais de 100 países." },
  { iso:"LV", name:"Letônia",             continent:"europe", flag:"🇱🇻", type:"país",       desc:"A bandeira da Letônia tem três faixas horizontais — carmesim-escuro, branca e carmesim-escuro. O tom único de vermelho-escuro (maroon) é chamado de 'vermelho letão'. Segundo a lenda medieval, um líder tribal ferido foi envolto num lençol branco que ficou com bordas tingidas de sangue. Adotada em 1918, na primeira república, e restaurada em 1990 durante a independência da URSS." },
  { iso:"LI", name:"Liechtenstein",       continent:"europe", flag:"🇱🇮", type:"país",       desc:"A bandeira do Liechtenstein tem duas faixas horizontais — azul (superior) e vermelha — com uma coroa dourada no canto superior esquerdo. O azul representa o céu e o vermelho, as lareiras acesas nos longos invernos. A coroa foi adicionada em 1937, quando se descobriu nos Jogos Olímpicos de 1936 que a bandeira era idêntica à do Haiti. Adotada na forma atual em 1982." },
  { iso:"LT", name:"Lituânia",            continent:"europe", flag:"🇱🇹", type:"país",       desc:"A bandeira da Lituânia tem três faixas horizontais — amarela, verde e vermelha. O amarelo representa o sol e as espigas de trigo; o verde, as florestas e a esperança; e o vermelho, o sangue dos que morreram pela pátria e o amor à liberdade. Adotada em 1918, na primeira república independente, e restaurada em 1990 durante o movimento de independência da URSS." },
  { iso:"LU", name:"Luxemburgo",          continent:"europe", flag:"🇱🇺", type:"país",       desc:"A bandeira do Luxemburgo tem três faixas horizontais — vermelha, branca e azul-claro. É muito similar à bandeira dos Países Baixos, diferindo apenas na tonalidade mais clara do azul e nas proporções. O vermelho, branco e azul são as cores do Ducado de Luxemburgo medieval. Adotada em 1972, quando o azul-claro (celeste) foi oficialmente distinguido do azul holandês, pondo fim à confusão." },
  { iso:"MT", name:"Malta",               continent:"europe", flag:"🇲🇹", type:"país",       desc:"A bandeira de Malta tem duas faixas verticais — branca à esquerda e vermelha à direita — com a Cruz de Jorge em prata no canto superior esquerdo. A Cruz de Jorge foi concedida à ilha pelo Rei Jorge VI da Grã-Bretanha em 1942, em reconhecimento ao heroísmo maltês durante o cerco da Segunda Guerra Mundial. O branco e vermelho são as cores históricas de Malta. Adotada na independência em 1964." },
  { iso:"MD", name:"Moldávia",            continent:"europe", flag:"🇲🇩", type:"país",       desc:"A bandeira da Moldávia é um tricolor vertical azul, amarelo e vermelho com o brasão nacional no centro. O brasão mostra uma águia segurando escudo com boi — símbolo histórico da Moldávia medieval — , ramos de oliveira e palmeira. As cores são baseadas na bandeira da Romênia, refletindo os laços históricos e culturais entre os dois países. Adotada em 1990, com a dissolução da URSS." },
  { iso:"MC", name:"Mônaco",              continent:"europe", flag:"🇲🇨", type:"país",       desc:"A bandeira de Mônaco tem duas faixas horizontais — vermelha (superior) e branca (inferior). São as cores históricas da Casa Grimaldi, que governa Mônaco desde 1297, tornando-a uma das famílias governantes mais antigas da Europa. A bandeira é quase idêntica à da Indonésia (apenas as proporções diferem). Adotada em 1881, é uma das bandeiras nacionais mais simples e antigas da Europa." },
  { iso:"ME", name:"Montenegro",          continent:"europe", flag:"🇲🇪", type:"país",       desc:"A bandeira do Montenegro tem fundo dourado com uma fina borda vermelha e a águia bicéfala dourada com escudo no centro. O dourado e o vermelho são as cores históricas do Montenegro, associadas à família real Petrović-Njegoš. A águia bicéfala é herança heráldica do período medieval e a influência do Império Byzantino. Adotada na independência da União Estatal Sérvia e Montenegro em 2006." },
  { iso:"NL", name:"Países Baixos",       continent:"europe", flag:"🇳🇱", type:"país",       desc:"A bandeira dos Países Baixos é um tricolor horizontal vermelho, branco e azul. É a mais antiga tricolor ainda em uso, derivada dos estandartes da Casa de Orange-Nassau no século XVI. O vermelho original era laranja (cor da Casa de Orange), mas mudou para vermelho em uso popular e foi formalizado. Influenciou imensamente outras bandeiras, incluindo a francesa, a russa e a americana." },
  { iso:"MK", name:"Macedônia do Norte",  continent:"europe", flag:"🇲🇰", type:"país",       desc:"A bandeira da Macedônia do Norte tem fundo vermelho com sol dourado de oito raios irradiando do centro para as bordas. O 'Sol da Liberdade' foi adotado em 1995 como solução de compromisso com a Grécia, que contestava o uso do Sol de Vergina de 16 raios — símbolo histórico grego da dinastia macedônia. Adotada na independência da Iugoslávia em 1991 e modificada em 1995." },
  { iso:"NO", name:"Noruega",             continent:"europe", flag:"🇳🇴", type:"país",       desc:"A bandeira da Noruega tem fundo vermelho com uma cruz azul bordeada de branco (cruz nórdica). O vermelho e branco são as cores históricas da Noruega e a cruz azul reflete a ligação escandinava com a Dinamarca e a Suécia. Adotada em 1821, tornou-se símbolo da independência norueguesa. O padrão da cruz nórdica influenciou todas as bandeiras dos países nórdicos." },
  { iso:"PL", name:"Polônia",             continent:"europe", flag:"🇵🇱", type:"país",       desc:"A bandeira da Polônia tem duas faixas horizontais — branca (superior) e vermelha (inferior). O branco e vermelho são as cores heráldicas polonesas desde o século XIV, derivadas do escudo nacional com a águia branca em campo vermelho. As cores foram oficializadas em 1831, durante a Revolta de Novembro contra a dominação russa. Adotada na forma atual em 1919." },
  { iso:"PT", name:"Portugal",            continent:"europe", flag:"🇵🇹", type:"país",       desc:"A bandeira de Portugal tem campo verde à esquerda (dois quintos) e campo vermelho à direita (três quintos) com o brasão nacional na divisa. O verde representa a esperança e o vermelho, o sangue dos que morreram pela pátria. O brasão mostra castelos mouríscos conquistados e escudos azuis com besantes brancos das batalhas contra os leoneses. Adotada em 1911, com a proclamação da república." },
  { iso:"RO", name:"Romênia",             continent:"europe", flag:"🇷🇴", type:"país",       desc:"A bandeira da Romênia é um tricolor vertical azul, amarelo e vermelho. Adotada durante a Revolução de 1848, inspirada na tricolor francesa. O azul representa a liberdade; o amarelo, a justiça e a riqueza; e o vermelho, a fraternidade e o sangue. É praticamente idêntica à bandeira do Chade (diferindo em tonalidades), o que levou a uma reclamação formal do Chade à ONU. Adotada oficialmente em 1989, sem brasão comunista." },
  { iso:"RU", name:"Rússia",              continent:"europe", flag:"🇷🇺", type:"país",       desc:"A bandeira da Rússia é um tricolor horizontal branco, azul e vermelho. Criada por Pedro o Grande no século XVII, inspirada nos tricolores dos Países Baixos. O branco representa a generosidade e a nobreza; o azul, a fidelidade e a castidade; e o vermelho, a coragem e o amor. Adotada em 1699 para a marinha imperial e tornada bandeira nacional em 1991, com o fim da URSS." },
  { iso:"SM", name:"San Marino",          continent:"europe", flag:"🇸🇲", type:"país",       desc:"A bandeira de San Marino tem duas faixas horizontais — azul (superior) e branca — com o brasão nacional no centro. O azul representa o céu e o branco, os picos nevados do Monte Titano. O brasão mostra as três torres medievais do Monte Titano sobre ramos de carvalho e laurel. San Marino se proclama a república mais antiga do mundo, fundada em 301 d.C. Adotada em 1862." },
